<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>DA 系統初始化 - 權限設定</title>
</head>
<body>
    <h2>正在初始化管理員權限...</h2>
    <div id="log"></div>

    <script type="module">
        import { CONFIG } from './config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(CONFIG.firebaseConfig);
        const db = getFirestore(app);
        const logDiv = document.getElementById('log');

        async function initAdmins() {
            try {
                const adminList = CONFIG.ADMIN_UIDS;
                
                for (const uid of adminList) {
                    // 使用 UID 作為 Document ID
                    await setDoc(doc(db, "admins", uid), {
                        role: "admin",
                        createdAt: serverTimestamp()
                    });
                    logDiv.innerHTML += `<p style="color:green;">✅ UID: ${uid} 已成功加入管理員清單</p>`;
                }
                logDiv.innerHTML += "<h3>🎉 所有管理員權限已設定完成，現在可以關閉此頁面。</h3>";
            } catch (e) {
                logDiv.innerHTML += `<p style="color:red;">❌ 錯誤: ${e.message}</p>`;
            }
        }

        initAdmins();
    </script>
</body>
</html>
