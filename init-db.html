<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化資料庫 - Destination Anywhere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-map-marked-alt me-2"></i>Destination Anywhere
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">首頁</a>
                <a class="nav-link" href="booking.html">預訂行程</a>
                <a class="nav-link" href="admin.html">管理員</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">
            <i class="fas fa-database me-2"></i>初始化資料庫
        </h1>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">資料庫初始化工具</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted mb-4">
                            此工具用於初始化 Firebase Firestore 資料庫，建立基本的集合和範例資料。
                        </p>

                        <div class="mb-4">
                            <h6>初始化項目：</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="initDrivers" checked>
                                <label class="form-check-label" for="initDrivers">
                                    初始化司機資料
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="initVehicles" checked>
                                <label class="form-check-label" for="initVehicles">
                                    初始化車輛資料
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="initBookings" checked>
                                <label class="form-check-label" for="initBookings">
                                    初始化預訂資料
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="initSettings" checked>
                                <label class="form-check-label" for="initSettings">
                                    初始化系統設定
                                </label>
                            </div>
                        </div>

                        <button class="btn btn-primary" onclick="initializeDatabase()">
                            <i class="fas fa-play me-2"></i>開始初始化
                        </button>
                        <button class="btn btn-danger ms-2" onclick="clearDatabase()">
                            <i class="fas fa-trash me-2"></i>清空資料庫
                        </button>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">初始化結果</h5>
                    </div>
                    <div class="card-body">
                        <div id="initResult" class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            等待初始化...
                        </div>
                        <div id="initProgress" style="display: none;">
                            <div class="progress mb-3">
                                <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                            </div>
                            <div id="progressText"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">資料庫結構</h5>
                    </div>
                    <div class="card-body">
                        <h6>集合：</h6>
                        <ul class="list-unstyled">
                            <li class="mb-2">
                                <i class="fas fa-users me-2 text-primary"></i>
                                <strong>drivers</strong> - 司機資料
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-car me-2 text-success"></i>
                                <strong>vehicles</strong> - 車輛資料
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-calendar me-2 text-warning"></i>
                                <strong>bookings</strong> - 預訂資料
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-cog me-2 text-info"></i>
                                <strong>settings</strong> - 系統設定
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">注意事項</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled small">
                            <li class="mb-2">
                                <i class="fas fa-exclamation-triangle me-2 text-warning"></i>
                                此操作會修改資料庫內容
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-info-circle me-2 text-info"></i>
                                建議在測試環境中進行
                            </li>
                            <li class="mb-2">
                                <i class="fas fa-backup me-2 text-success"></i>
                                請先備份重要資料
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // 初始化資料庫
        async function initializeDatabase() {
            const resultDiv = document.getElementById('initResult');
            const progressDiv = document.getElementById('initProgress');
            const progressBar = progressDiv.querySelector('.progress-bar');
            const progressText = document.getElementById('progressText');
            
            // 顯示進度條
            progressDiv.style.display = 'block';
            resultDiv.className = 'alert alert-info';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>正在初始化...';
            
            const initTasks = [];
            let completedTasks = 0;
            const totalTasks = 4;
            
            // 檢查要初始化的項目
            if (document.getElementById('initDrivers').checked) {
                initTasks.push('drivers');
            }
            if (document.getElementById('initVehicles').checked) {
                initTasks.push('vehicles');
            }
            if (document.getElementById('initBookings').checked) {
                initTasks.push('bookings');
            }
            if (document.getElementById('initSettings').checked) {
                initTasks.push('settings');
            }
            
            try {
                // 初始化司機資料
                if (initTasks.includes('drivers')) {
                    progressText.textContent = '正在初始化司機資料...';
                    await initDrivers();
                    completedTasks++;
                    progressBar.style.width = `${(completedTasks / totalTasks) * 100}%`;
                }
                
                // 初始化車輛資料
                if (initTasks.includes('vehicles')) {
                    progressText.textContent = '正在初始化車輛資料...';
                    await initVehicles();
                    completedTasks++;
                    progressBar.style.width = `${(completedTasks / totalTasks) * 100}%`;
                }
                
                // 初始化預訂資料
                if (initTasks.includes('bookings')) {
                    progressText.textContent = '正在初始化預訂資料...';
                    await initBookings();
                    completedTasks++;
                    progressBar.style.width = `${(completedTasks / totalTasks) * 100}%`;
                }
                
                // 初始化系統設定
                if (initTasks.includes('settings')) {
                    progressText.textContent = '正在初始化系統設定...';
                    await initSettings();
                    completedTasks++;
                    progressBar.style.width = `${(completedTasks / totalTasks) * 100}%`;
                }
                
                // 完成初始化
                resultDiv.className = 'alert alert-success';
                resultDiv.innerHTML = '<i class="fas fa-check me-2"></i>資料庫初始化完成！';
                progressDiv.style.display = 'none';
                
            } catch (error) {
                console.error('初始化失敗:', error);
                resultDiv.className = 'alert alert-danger';
                resultDiv.innerHTML = `<i class="fas fa-times me-2"></i>初始化失敗: ${error.message}`;
                progressDiv.style.display = 'none';
            }
        }

        // 初始化司機資料
        async function initDrivers() {
            const drivers = [
                {
                    name: '李司機',
                    phone: '0912-345-678',
                    email: 'driver1@example.com',
                    license: 'B123456789',
                    experience: 3,
                    rating: 4.8,
                    status: 'active',
                    createdAt: new Date()
                },
                {
                    name: '王司機',
                    phone: '0987-654-321',
                    email: 'driver2@example.com',
                    license: 'B987654321',
                    experience: 5,
                    rating: 4.9,
                    status: 'active',
                    createdAt: new Date()
                }
            ];
            
            for (const driver of drivers) {
                await window.db.collection('drivers').add(driver);
            }
        }

        // 初始化車輛資料
        async function initVehicles() {
            const vehicles = [
                {
                    plateNumber: 'ABC-1234',
                    make: 'Toyota',
                    model: 'Camry',
                    year: 2022,
                    type: 'sedan',
                    capacity: 4,
                    status: 'available',
                    createdAt: new Date()
                },
                {
                    plateNumber: 'DEF-5678',
                    make: 'Toyota',
                    model: 'Alphard',
                    year: 2023,
                    type: 'van',
                    capacity: 8,
                    status: 'available',
                    createdAt: new Date()
                }
            ];
            
            for (const vehicle of vehicles) {
                await window.db.collection('vehicles').add(vehicle);
            }
        }

        // 初始化預訂資料
        async function initBookings() {
            const bookings = [
                {
                    customerName: '張三',
                    customerPhone: '0911-222-333',
                    customerEmail: 'customer1@example.com',
                    pickup: '台北車站',
                    destination: '桃園機場',
                    date: '2024-04-24',
                    time: '14:30',
                    passengers: 2,
                    vehicle: 'sedan',
                    price: 800,
                    status: 'pending',
                    createdAt: new Date()
                }
            ];
            
            for (const booking of bookings) {
                await window.db.collection('bookings').add(booking);
            }
        }

        // 初始化系統設定
        async function initSettings() {
            const settings = {
                companyName: 'Destination Anywhere',
                contactPhone: '+886-2-1234-5678',
                contactEmail: 'info@destination-anywhere.com',
                baseFare: 300,
                vanSurcharge: 100,
                busSurcharge: 200,
                perKmRate: 10,
                businessHours: {
                    weekdays: '08:00 - 22:00',
                    weekends: '09:00 - 23:00'
                },
                createdAt: new Date()
            };
            
            await window.db.collection('settings').doc('main').set(settings);
        }

        // 清空資料庫
        async function clearDatabase() {
            if (!confirm('確定要清空所有資料嗎？此操作無法復原！')) {
                return;
            }
            
            const resultDiv = document.getElementById('initResult');
            resultDiv.className = 'alert alert-warning';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>正在清空資料庫...';
            
            try {
                const collections = ['drivers', 'vehicles', 'bookings', 'settings'];
                
                for (const collectionName of collections) {
                    const snapshot = await window.db.collection(collectionName).get();
                    const batch = window.db.batch();
                    
                    snapshot.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    
                    await batch.commit();
                }
                
                resultDiv.className = 'alert alert-success';
                resultDiv.innerHTML = '<i class="fas fa-check me-2"></i>資料庫已清空！';
                
            } catch (error) {
                console.error('清空失敗:', error);
                resultDiv.className = 'alert alert-danger';
                resultDiv.innerHTML = `<i class="fas fa-times me-2"></i>清空失敗: ${error.message}`;
            }
        }
    </script>
</body>
</html>
