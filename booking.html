<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預約行程</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #007AFF; --bg: #F2F2F7; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1C1C1E; -webkit-tap-highlight-color: transparent; }
    .card { background: #FFF; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .type-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .tab-btn { background: #FFF; border: none; padding: 12px 5px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #8E8E93; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--primary); color: #FFF; }
    .label-row { font-weight: 600; margin-bottom: 8px; display: block; font-size: 15px; }
    input, textarea { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; background: #F9F9F9; outline: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .counter-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .counter-ctrl { display: flex; align-items: center; gap: 15px; }
    .btn-circle { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--primary); color: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; font-weight: bold; }
    #price-preview { display: none; margin-top: 15px; padding: 15px; background: #F2F9FF; border-radius: 12px; border: 1px dashed var(--primary); text-align: center; }
    .price-text { color: #D70015; font-size: 26px; font-weight: 800; }
    #submit-btn { width: 100%; padding: 18px; background: var(--primary); color: #FFF; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; margin-top: 20px; cursor: pointer; }
    .pac-box { position: relative; width: 100%; }
    .custom-pac { position: absolute; background: white; width: 100%; z-index: 2000; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; max-height: 250px; overflow-y: auto; top: 52px; border: 1px solid #膽EE; }
    .pac-item { padding: 15px; border-bottom: 1px solid #F2F2F7; cursor: pointer; font-size: 14px; color: #333; text-align: left; }
    /* 新增：車種停用樣式 */
    .tab-btn.disabled-car { background: #E5E5EA !important; color: #AEAEB2 !important; cursor: not-allowed !important; opacity: 0.3; pointer-events: none; }
  </style>
</head>
<body>

<span class="label-row">服務類型</span>
<div class="type-tabs" style="grid-template-columns: repeat(4, 1fr); scale: 0.9;">
    <button class="tab-btn active" id="btn-接機" onclick="setTripType('接機')">接機</button>
    <button class="tab-btn" id="btn-送機" onclick="setTripType('送機')">送機</button>
    <button class="tab-btn" id="btn-市區" onclick="setTripType('市區')">市區</button>
    <button class="tab-btn" id="btn-包車" onclick="setTripType('包車')">包車</button>
</div>

<span class="label-row">選擇車種 <small id="su-hint" style="color:var(--primary); font-weight:normal;"></small></span>
<div class="type-tabs" id="vehicle-selector" style="grid-template-columns: repeat(3, 1fr);">
    <button class="tab-btn active" id="btn-eco_5" onclick="selectVehicle('eco_5')">經濟五座</button>
    <button class="tab-btn" id="btn-pro_5" onclick="selectVehicle('pro_5')">舒適五座</button>
    <button class="tab-btn" id="btn-family_7" onclick="selectVehicle('family_7')">家庭七座</button>
    <button class="tab-btn" id="btn-std_9" onclick="selectVehicle('std_9')">標準九座</button>
    <button class="tab-btn" id="btn-premium_9" onclick="selectVehicle('premium_9')">尊榮九座</button>
    <button class="tab-btn" id="btn-vip_7" onclick="selectVehicle('vip_7')">旗艦獨立席</button>
</div>

  <div class="card">
    <span class="label-row">上車地點</span>
    <div class="pac-box">
      <input type="text" id="pickup" placeholder="輸入起點" autocomplete="off" data-pid="">
      <div id="pac-pickup" class="custom-pac"></div>
    </div>

    <div id="mid-wrap" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="label-row">中途停靠站</span>
        <span style="color:#FF3B30; font-size:14px; cursor:pointer; margin-bottom:8px;" onclick="toggleMid(false)">✕ 移除</span>
      </div>
      <div class="pac-box">
        <input type="text" id="midStops" placeholder="輸入停靠點" autocomplete="off" data-pid="">
        <div id="pac-midStops" class="custom-pac"></div>
      </div>
    </div>
    <div style="color:var(--primary); font-size:14px; margin-bottom:12px; cursor:pointer;" onclick="toggleMid(true)" id="add-mid-btn">+ 新增中途停靠站</div>

    <span class="label-row">下車地點</span>
    <div class="pac-box">
      <input type="text" id="dropoff" placeholder="輸入目的地" autocomplete="off" data-pid="">
      <div id="pac-dropoff" class="custom-pac"></div>
    </div>

    <div id="price-preview">
      <div style="font-size: 13px; color: #666;">預估里程：<span id="dist-val">0</span> km</div>
      <div class="price-text">$ <span id="price-val">0</span></div>
    </div>
  </div>

  <div class="card">
    <div class="grid-2">
      <div><span class="label-row">日期時間</span><input type="datetime-local" id="appointmentTime"></div>
      <div id="flight-field"><span class="label-row">航班號碼</span><input type="text" id="flightNo" placeholder="如 CX450"></div>
    </div>
  </div>

  <div class="card">
    <div class="counter-group"><span>成人人數</span><div class="counter-ctrl"><div class="btn-circle" onclick="change('adults',-1)">-</div><span id="val-adults">1</span><div class="btn-circle" onclick="change('adults',1)">+</div></div></div>
    <div class="counter-group"><span>兒童人數</span><div class="counter-ctrl"><div class="btn-circle" onclick="change('children',-1)">-</div><span id="val-children">0</span><div class="btn-circle" onclick="change('children',1)">+</div></div></div>
    <div class="counter-group"><span>大行李 (28吋+)</span><div class="counter-ctrl"><div class="btn-circle" onclick="change('lugL',-1)">-</div><span id="val-lugL">0</span><div class="btn-circle" onclick="change('lugL',1)">+</div></div></div>
    <div class="counter-group"><span>中行李 (20-24吋)</span><div class="counter-ctrl"><div class="btn-circle" onclick="change('lugM',-1)">-</div><span id="val-lugM">0</span><div class="btn-circle" onclick="change('lugM',1)">+</div></div></div>
    <div class="counter-group"><span>小行李/手提</span><div class="counter-ctrl"><div class="btn-circle" onclick="change('lugS',-1)">-</div><span id="val-lugS">0</span><div class="btn-circle" onclick="change('lugS',1)">+</div></div></div>
  </div>

  <div class="card">
    <div class="grid-2">
      <div><span class="label-row">聯絡姓名</span><input type="text" id="contactName"></div>
      <div><span class="label-row">電話號碼</span><input type="tel" id="contactPhone"></div>
    </div>
    <span class="label-row">備註需求</span>
    <textarea id="note" rows="2" placeholder="特殊需求（如安全座椅等）"></textarea>
  </div>

  <button id="submit-btn" onclick="sendOrder()">立即發送預約</button>

  <script>
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once."):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
      key: "AIzaSyAni5ZB9eIS44B0NaMFCRpzNhFPiBu1MjY",
      v: "beta"
    });
  </script>

<script>
// --- [1. 初始化與全域變數] ---
const SU_WEIGHTS = { lugL: 2.0, lugM: 1.2, lugS: 0.7 };
const VEHICLE_MASTER = [
    { id: 'eco_5',    name: '經濟五座',   base: 150, maxPax: 4, maxSU: 4.2,  isDynamic: false },
    { id: 'pro_5',    name: '舒適五座',   base: 250, maxPax: 4, maxSU: 6.5,  isDynamic: false },
    { id: 'family_7', name: '家庭七座',   base: 450, maxPax: 6, maxSU: 9.0,  isDynamic: true  },
    { id: 'vip_7',    name: '旗艦獨立席', base: 800, maxPax: 6, maxSU: 5.5,  isDynamic: false },
    { id: 'std_9',    name: '標準九座',   base: 450, maxPax: 8, maxSU: 18.0, isDynamic: false },
    { id: 'premium_9',name: '尊榮九座',   base: 650, maxPax: 8, maxSU: 22.0, isDynamic: false }
];

// 核心狀態變數 (確保不重複宣告)
let selectedVehicleId = 'eco_5';
let tripType = "接機";
let counts = { adults: 1, children: 0, lugL: 0, lugM: 0, lugS: 0 };
let currentKm = 0, currentPrice = 0, currentRequiredSU = 0;
let RouteClass, SuggestionClass, sessionToken, PlaceClass;

// --- [2. 地圖功能] ---
async function initMap() {
    const [places, routes] = await Promise.all([
      google.maps.importLibrary("places"),
      google.maps.importLibrary("routes")
    ]);
    RouteClass = routes.Route;
    PlaceClass = places.Place;
    SuggestionClass = places.AutocompleteSuggestion;
    sessionToken = new places.AutocompleteSessionToken();
    setupField('pickup', 'pac-pickup');
    setupField('midStops', 'pac-midStops');
    setupField('dropoff', 'pac-dropoff');
}

function setupField(inputId, pacId) {
    const input = document.getElementById(inputId);
    const pac = document.getElementById(pacId);
    input.addEventListener('input', async () => {
      const val = input.value;
      if (val.length < 2) { pac.style.display = 'none'; return; }
      try {
        const { suggestions } = await SuggestionClass.fetchAutocompleteSuggestions({
          input: val, sessionToken: sessionToken, region: 'TW', language: 'zh-TW'
        });
        if (suggestions && suggestions.length > 0) {
          pac.innerHTML = '';
          suggestions.forEach(s => {
            const div = document.createElement('div');
            div.className = 'pac-item';
            div.innerText = s.placePrediction.text.text;
            div.onclick = () => {
              input.value = s.placePrediction.text.text;
              input.dataset.pid = s.placePrediction.placeId;
              pac.style.display = 'none';
              calculateNewRoute();
            };
            pac.appendChild(div);
          });
          pac.style.display = 'block';
        }
      } catch (e) { console.error("自動完成錯誤：", e); }
    });
}

async function calculateNewRoute() {
    const pickupPid = document.getElementById('pickup').dataset.pid;
    const dropoffPid = document.getElementById('dropoff').dataset.pid;
    const midPid = document.getElementById('midStops').dataset.pid;
    const midVisible = document.getElementById('mid-wrap').style.display !== 'none';

    if (!pickupPid || !dropoffPid) return;

    try {
        const request = {
            origin: new PlaceClass({ id: pickupPid }),
            destination: new PlaceClass({ id: dropoffPid }),
            travelMode: 'DRIVING'
        };
        if (midVisible && midPid) request.intermediates = [new PlaceClass({ id: midPid })];

        const response = await RouteClass.computeRoutes({ ...request, fields: ['distanceMeters'] });

        if (response.routes && response.routes.length > 0) {
            currentKm = response.routes[0].distanceMeters / 1000;
            const vehicle = VEHICLE_MASTER.find(v => v.id === selectedVehicleId);
            const basePrice = vehicle ? vehicle.base : 150;
            
            // 基礎計價公式：起步價 + (超過5公里後的里程 * 35)
            currentPrice = Math.round(basePrice + (currentKm > 5 ? (currentKm - 5) * 35 : 0));

            document.getElementById('price-preview').style.display = 'block';
            document.getElementById('dist-val').innerText = currentKm.toFixed(1);
            document.getElementById('price-val').innerText = currentPrice;
        }
    } catch (e) { console.error("計算失敗", e); }
}

// --- [3. 關鍵修正：將函數掛載到 window 供 HTML onclick 使用] ---

window.setTripType = (t) => {
    tripType = t;
    // 更新 UI 狀態
    const serviceTypes = ['接機', '送機', '市區', '包車'];
    serviceTypes.forEach(type => {
        const btn = document.getElementById(`btn-${type}`);
        if (btn) btn.classList.toggle('active', type === t);
    });
    // 切換航班號碼欄位顯示
    const flightField = document.getElementById('flightNo').parentElement;
    if (flightField) flightField.style.display = (t === '接機') ? 'block' : 'none';
};

window.selectVehicle = (vId) => {
    selectedVehicleId = vId;
    // 更新 UI 狀態
    VEHICLE_MASTER.forEach(car => {
        const btn = document.getElementById(`btn-${car.id}`);
        if (btn) btn.classList.toggle('active', car.id === vId);
    });
    calculateNewRoute();
};

window.change = (k, d) => {
    counts[k] = Math.max((k === 'adults' ? 1 : 0), counts[k] + d);
    const el = document.getElementById(`val-${k}`);
    if (el) el.innerText = counts[k];
    updateVehicleFilter();
};

window.toggleMid = (show) => {
    document.getElementById('mid-wrap').style.display = show ? 'block' : 'none';
    document.getElementById('add-mid-btn').style.display = show ? 'none' : 'block';
    if (!show) {
        document.getElementById('midStops').value = '';
        document.getElementById('midStops').dataset.pid = '';
        calculateNewRoute();
    }
};

function updateVehicleFilter() {
    currentRequiredSU = (counts.lugL * SU_WEIGHTS.lugL) + (counts.lugM * SU_WEIGHTS.lugM) + (counts.lugS * SU_WEIGHTS.lugS);
    const totalPax = counts.adults + counts.children;
    document.getElementById('su-hint').innerText = `(行李係數: ${currentRequiredSU.toFixed(1)})`;

    VEHICLE_MASTER.forEach(car => {
        let maxSU = car.maxSU;
        if (car.id === 'family_7' && totalPax > 4) maxSU = 1.5;

        const btn = document.getElementById(`btn-${car.id}`);
        const isOver = (totalPax > car.maxPax || currentRequiredSU > maxSU);
        
        if (btn) {
            btn.classList.toggle('disabled-car', isOver);
            if (isOver && selectedVehicleId === car.id) {
                btn.classList.remove('active');
            }
        }
    });
}

window.sendOrder = () => { 
    alert("訂單已準備封裝，SU 係數: " + currentRequiredSU.toFixed(1)); 
};

// 執行初始化
initMap();
</script>
</script>
</body>
</html>
