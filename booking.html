<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約接送 | Destination Anywhere</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="style.css?v=1">

  <style>
    /* 2. 僅保留 Booking 頁面特有的邏輯樣式 */
    .tabs { display: flex; background: #E3E3E6; border-radius: 12px; padding: 3px; margin-bottom: 15px; }
    .tab-btn { flex: 1; border: none; padding: 10px 0; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-sub); transition: 0.2s; }
    .tab-btn.active { background: white; color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .input-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; border-bottom: 1px solid #F2F2F7; padding-bottom: 8px; }
    .label-txt { width: 80px; font-size: 14px; font-weight: 600; color: #48484A; }
    .main-input { flex: 1; border: none; padding: 8px 0; font-size: 16px; background: transparent; color: var(--text-main); outline: none; }

    .datetime-container { display: flex; gap: 10px; }
    
    /* 計數器專用 */
    .counter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .counter-ctrl { display: flex; align-items: center; gap: 15px; }
    .ctrl-btn { background: #E3E3E6; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; color: var(--apple-blue); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    
    .delete-btn { color: var(--apple-red); font-size: 12px; border: 1px solid var(--apple-red); padding: 2px 6px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<div class="section-title">👤 聯絡資訊</div>
<div class="card">
  <div class="input-row">
    <span class="label-txt">聯絡人</span>
    <input type="text" id="contact-name" class="main-input">
  </div>
  <div class="input-row">
    <span class="label-txt">電話</span>
    <input type="tel" id="contact-phone" class="main-input" placeholder="09xx-xxx-xxx">
  </div>
</div>

<div class="section-title">📍 行程站點</div>
<div class="card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('送機', this)">送機</button>
    <button class="tab-btn" onclick="switchTab('接機', this)">接機</button>
    <button class="tab-btn" onclick="switchTab('交通趟', this)">交通趟</button>
    <button class="tab-btn" onclick="switchTab('包車', this)">包車</button>
  </div>
  <div id="station-container">
    <div id="flight-section">
      <div class="input-row">
        <span class="label-txt">航班號碼</span>
        <input type="text" id="flight-no" class="main-input" placeholder="例如: BR198" oninput="renderStops()">
      </div>
    </div>
    <div id="stops-list"></div>
  </div>
  <div style="text-align:center; color:var(--apple-blue); font-size:13px; font-weight:600; padding-top:10px; cursor:pointer;" onclick="addNewStop()">+ 新增停靠點</div>
</div>

<div class="section-title">⏰ 預預約時間</div>
<div class="card datetime-container">
  <input type="date" id="order-date">
  <input type="time" id="order-time">
</div>

<div class="section-title">🧳 人數行李</div>
<div class="card">
  <div class="counter-row"><span>成人</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('adult-count',-1)">-</button><b id="adult-count">1</b><button class="ctrl-btn" onclick="qty('adult-count',1)">+</button></div></div>
  <div class="counter-row"><span>兒童</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('child-count',-1)">-</button><b id="child-count">0</b><button class="ctrl-btn" onclick="qty('child-count',1)">+</button></div></div>
  <hr style="border:0; border-top:1px solid #F2F2F7; margin:15px 0;">
  <div class="counter-row"><span>大型行李 (28吋以上)</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('l-luggage',-1)">-</button><b id="l-luggage">0</b><button class="ctrl-btn" onclick="qty('l-luggage',1)">+</button></div></div>
  <div class="counter-row"><span>中小型行李</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('s-luggage',-1)">-</button><b id="s-luggage">0</b><button class="ctrl-btn" onclick="qty('s-luggage',1)">+</button></div></div>
</div>

<div class="section-title">📝 備註</div>
<div class="card">
  <textarea id="order-note" rows="2" placeholder="特殊需求（例如：兒童安全座椅、寵物、多點上車地點說明...）"></textarea>
</div>

<div style="padding: 10px 0 30px;">
  <button class="btn btn-blue" id="submit-btn" onclick="sendRequest()">確認預約</button>
</div>

<script type="module">
  // JavaScript 邏輯保持不變，依照之前的對話，暫不移至外部 JS
  import { CONFIG } from './config.js?v=5';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ... (其餘初始化與 sendRequest 邏輯保持不變) ...
</script>
</body>
</html>
