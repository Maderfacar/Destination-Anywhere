<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約接送 | Destination Anywhere</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    /* 核心佈局 */
    #success-screen { display: none !important; text-align: center; padding: 40px 20px; }
    #booking-container { display: block; }

    .tabs { display: flex; background: #E3E3E6; border-radius: 12px; padding: 3px; margin-bottom: 15px; }
    .tab-btn { flex: 1; border: none; padding: 10px 0; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #8E8E93; transition: 0.2s; }
    .tab-btn.active { background: white; color: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .input-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; border-bottom: 1px solid #F2F2F7; padding-bottom: 8px; }
    .label-txt { width: 85px; font-size: 13px; font-weight: 600; color: #48484A; line-height: 1.2; }
    .main-input { flex: 1; border: none; padding: 8px 0; font-size: 16px; background: transparent; color: #000; outline: none; }
    
    /* 時間選擇器樣式優化 */
    .datetime-container { display: flex; gap: 8px; align-items: center; }
    .datetime-container input[type="date"] { flex: 2; padding: 10px; border: 1px solid #EEE; border-radius: 8px; font-size: 15px; }
    .time-select-group { flex: 3; display: flex; gap: 4px; align-items: center; }
    .time-select-group select { flex: 1; padding: 10px 5px; border: 1px solid #EEE; border-radius: 8px; font-size: 15px; background: #FFF; }

    .counter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .counter-ctrl { display: flex; align-items: center; gap: 15px; }
    .ctrl-btn { background: #E3E3E6; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; color: #0071E3; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .delete-btn { color: #FF3B30; font-size: 11px; border: 1px solid #FF3B30; padding: 2px 5px; border-radius: 4px; cursor: pointer; }
    .luggage-desc { font-size: 11px; color: #8E8E93; display: block; font-weight: 400; }
    .qr-box { background: white; padding: 15px; border-radius: 12px; display: inline-block; margin: 20px 0; border: 1px solid #EEE; }
    .qr-box img { width: 200px; height: 200px; display: block; }
  </style>
</head>
<body>

<div id="booking-container">
  <div class="section-title">👤 聯絡資訊</div>
  <div class="card">
    <div class="input-row"><span class="label-txt">聯絡人</span><input type="text" id="contact-name" class="main-input" placeholder="讀取中..."></div>
    <div class="input-row"><span class="label-txt">電話</span><input type="tel" id="contact-phone" class="main-input" placeholder="09xx-xxx-xxx"></div>
  </div>

  <div class="section-title">📍 行程站點</div>
  <div class="card">
    <div class="tabs">
      <button id="default-tab" class="tab-btn active" onclick="switchTab('送機', this)">送機</button>
      <button class="tab-btn" onclick="switchTab('接機', this)">接機</button>
      <button class="tab-btn" onclick="switchTab('交通趟', this)">交通趟</button>
      <button class="tab-btn" onclick="switchTab('包車', this)">包車</button>
    </div>
    <div id="station-container">
      <div id="flight-section"><div class="input-row"><span class="label-txt">航班號碼</span><input type="text" id="flight-no" class="main-input" placeholder="例如: BR198"></div></div>
      <div id="stops-list"></div>
    </div>
    <div style="text-align:center; color:#0071E3; font-size:13px; font-weight:600; padding-top:10px; cursor:pointer;" onclick="addNewStop()">+ 新增停靠點</div>
  </div>

  <div class="section-title">⏰ 預約時間</div>
  <div class="card datetime-container">
    <input type="date" id="order-date">
    <div class="time-select-group">
      <select id="time-hour"></select>
      <span>:</span>
      <select id="time-minute">
        <option value="00">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
      </select>
    </div>
  </div>

  <div class="section-title">🧳 人數行李</div>
  <div class="card">
    <div class="counter-row"><span>成人</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('adults',-1)">-</button><b id="adults">0</b><button class="ctrl-btn" onclick="qty('adults',1)">+</button></div></div>
    <div class="counter-row"><span>兒童</span><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('children',-1)">-</button><b id="children">0</b><button class="ctrl-btn" onclick="qty('children',1)">+</button></div></div>
    <hr style="border:0; border-top:1px solid #F2F2F7; margin:15px 0;">
    <div class="counter-row"><div><span>18-20吋</span><span class="luggage-desc">登機箱</span></div><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('luggage_S',-1)">-</button><b id="luggage_S">0</b><button class="ctrl-btn" onclick="qty('luggage_S',1)">+</button></div></div>
    <div class="counter-row"><div><span>22-24吋</span><span class="luggage-desc">中型託運</span></div><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('luggage_M',-1)">-</button><b id="luggage_M">0</b><button class="ctrl-btn" onclick="qty('luggage_M',1)">+</button></div></div>
    <div class="counter-row"><div><span>26-28吋</span><span class="luggage-desc">大型託運</span></div><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('luggage_L',-1)">-</button><b id="luggage_L">0</b><button class="ctrl-btn" onclick="qty('luggage_L',1)">+</button></div></div>
    <div class="counter-row"><div><span>30-32吋</span><span class="luggage-desc">超大託運</span></div><div class="counter-ctrl"><button class="ctrl-btn" onclick="qty('luggage_XL',-1)">-</button><b id="luggage_XL">0</b><button class="ctrl-btn" onclick="qty('luggage_XL',1)">+</button></div></div>
  </div>

  <div class="section-title">📝 備註</div>
  <div class="card"><textarea id="order-note" rows="2" placeholder="特殊需求說明..." style="width:100%; border:none; outline:none; font-family:inherit; font-size:14px;"></textarea></div>

  <div style="padding: 10px 0 30px;"><button class="btn btn-blue" id="submit-btn" onclick="sendRequest()">確認預約</button></div>
</div>

<div id="success-screen">
  <div style="font-size: 60px; color: #34C759; margin-bottom: 10px;">✅</div>
  <h2 style="margin: 0;">預約成功</h2>
  <div class="qr-box" id="qrcode-container"></div>
  <p id="display-order-id" style="font-size: 12px; color: #999; margin-top: 5px;"></p>
  <button class="btn btn-blue" style="margin-top:20px;" onclick="closeLiffWindow()">返回首頁</button>
</div>

<script type="module">
  import { db, CONFIG } from './firebase-config.js?v=1';
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let currentMode = '送機';
  let stops = [];
  let userProfile = null;

  // 初始化小時選單 (00-23)
  const hourSelect = document.getElementById('time-hour');
  for (let i = 0; i < 24; i++) {
    let h = i.toString().padStart(2, '0');
    hourSelect.options.add(new Option(h, h));
  }

  window.renderStops = () => {
    const list = document.getElementById('stops-list');
    if (!list) return;
    list.innerHTML = '';
    stops.forEach((stop, index) => {
      const isRemovable = index !== 0 && index !== stops.length - 1;
      const div = document.createElement('div');
      div.className = 'input-row';
      div.innerHTML = `
        <span class="label-txt">${stop.type}</span>
        <input type="text" class="main-input" placeholder="請輸入地址" value="${stop.address}" oninput="updateStop(${index}, this.value)">
        ${isRemovable ? `<span class="delete-btn" onclick="removeStop(${index})">刪除</span>` : ''}
      `;
      list.appendChild(div);
    });
  };

  window.switchTab = (mode, btn) => {
    currentMode = mode;
    const allBtns = document.querySelectorAll('.tab-btn');
    allBtns.forEach(b => b.classList.remove('active'));
    
    if (btn) {
      btn.classList.add('active');
    } else {
      allBtns.forEach(b => { if(b.innerText === mode) b.classList.add('active'); });
    }
    
    document.getElementById('flight-section').style.display = (mode === '送機' || mode === '接機') ? 'block' : 'none';
    
    const t = Date.now();
    if (mode === '送機') {
      stops = [{ id: t, address: '', type: '起點' }, { id: t+1, address: '', type: '機場' }];
    } else if (mode === '接機') {
      stops = [{ id: t, address: '', type: '機場' }, { id: t+1, address: '', type: '目的地' }];
    } else {
      stops = [{ id: t, address: '', type: '起點' }, { id: t+1, address: '', type: '目的地' }];
    }
    window.renderStops();
  };

  window.updateStop = (index, value) => { stops[index].address = value; };
  window.addNewStop = () => { stops.splice(stops.length - 1, 0, { id: Date.now(), address: '', type: '停靠點' }); window.renderStops(); };
  window.removeStop = (index) => { stops.splice(index, 1); window.renderStops(); };
  window.qty = (id, change) => {
    let el = document.getElementById(id);
    let val = parseInt(el.innerText) + change;
    el.innerText = val < 0 ? 0 : val;
  };

  window.sendRequest = async () => {
    const btn = document.getElementById('submit-btn');
    const name = document.getElementById('contact-name').value;
    const phone = document.getElementById('contact-phone').value;
    const date = document.getElementById('order-date').value;
    const hour = document.getElementById('time-hour').value;
    const min = document.getElementById('time-minute').value;

    if (!name || !phone || !date || stops[0].address === '' || stops[stops.length-1].address === '') {
      alert("請填寫完整資訊並確認起迄點地址"); return;
    }

    btn.disabled = true;
    btn.innerText = "正在預約...";

    const now = new Date();
    const orderTimeStr = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

    const orderData = {
      userId: userProfile?.userId || 'anonymous',
      contactName: name,
      contactPhone: phone,
      tripType: currentMode,
      appointmentTime: `${date} ${hour}:${min}`,
      orderTime: orderTimeStr,
      flightNo: document.getElementById('flight-no').value || '無',
      allStops: stops.map(s => `${s.type}: ${s.address}`).join(' -> '),
      pickupLocation: stops[0].address,
      midStops: stops.slice(1, -1).map(s => s.address).join(', '),
      dropoffLocation: stops[stops.length-1].address,
      adults: document.getElementById('adults').innerText,
      children: document.getElementById('children').innerText,
      luggage_S: document.getElementById('luggage_S').innerText,
      luggage_M: document.getElementById('luggage_M').innerText,
      luggage_L: document.getElementById('luggage_L').innerText,
      luggage_XL: document.getElementById('luggage_XL').innerText,
      note: document.getElementById('order-note').value || '無',
      status: 'pending'
    };

    try {
      const docRef = await addDoc(collection(db, "orders"), { ...orderData, createdAt: serverTimestamp() });
      await fetch('https://hook.us2.make.com/5gmkpwbfobn8k595pnhjlwm1qim3lcis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...orderData, orderId: docRef.id })
      });
      showSuccess(docRef.id);
    } catch (e) {
      alert("錯誤: " + e.message);
      btn.disabled = false;
      btn.innerText = "確認預約";
    }
  };

  function showSuccess(orderId) {
    document.getElementById('booking-container').style.display = 'none';
    const successScreen = document.getElementById('success-screen');
    successScreen.style.setProperty('display', 'block', 'important');
    document.getElementById('display-order-id').innerText = "訂單編號：" + orderId;
    document.getElementById('qrcode-container').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${orderId}" alt="QR">`;
  }

  window.closeLiffWindow = () => {
    if (liff.isInClient()) liff.closeWindow(); 
    else window.location.replace('index.html');
  };

  async function startApp() {
    // 優先渲染地址欄位
    window.switchTab('送機', document.getElementById('default-tab'));

    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (liff.isLoggedIn()) {
        userProfile = await liff.getProfile();
        if (userProfile && userProfile.displayName) {
          document.getElementById('contact-name').value = userProfile.displayName;
        }
      } else {
        document.getElementById('contact-name').value = "";
        document.getElementById('contact-name').placeholder = "請輸入聯絡姓名";
      }
    } catch (e) { 
      document.getElementById('contact-name').placeholder = "請輸入聯絡姓名";
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startApp);
  } else {
    startApp();
  }
</script>
</body>
</html>
