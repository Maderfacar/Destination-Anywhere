<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預約行程</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #007AFF; --bg: #F2F2F7; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1C1C1E; }
    .type-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .tab-btn { background: #FFF; border: none; padding: 12px 5px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #8E8E93; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
    .tab-btn.active { background: var(--primary); color: #FFF; }
    .card { background: #FFF; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .label-row { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; font-size: 15px; }
    input { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #F9F9F9; }
    #price-preview { display: none; margin-top: 15px; padding: 15px; background: #F2F9FF; border-radius: 12px; border: 1.5px dashed var(--primary); }
    .price-text { color: #D70015; font-size: 20px; font-weight: 800; }
  </style>
</head>
<body>

  <div class="type-tabs">
    <button class="tab-btn active" onclick="setType('接機', this)">接機</button>
    <button class="tab-btn" onclick="setType('送機', this)">送機</button>
    <button class="tab-btn" onclick="setType('市區', this)">市區</button>
    <button class="tab-btn" onclick="setType('包車', this)">包車</button>
  </div>

  <div class="card">
    <div class="label-row">上車地點</div>
    <input type="text" id="pickup" placeholder="請選擇地點" onblur="safeCalc()">
    <div style="margin: 15px 0;">
      <div class="label-row">下車地點</div>
      <input type="text" id="dropoff" placeholder="請選擇目的地" onblur="safeCalc()">
    </div>
    <div id="price-preview">
      <div style="font-size: 13px; color: #8E8E93;">預估里程：<span id="dist-val">0</span> km</div>
      <div style="margin-top: 5px;">預估車資：<span class="price-text">$ <span id="price-val">0</span></span></div>
    </div>
  </div>

  <button id="submit-btn" style="width:100%; padding:18px; background:var(--primary); color:#FFF; border:none; border-radius:16px; font-size:18px; font-weight:700;" onclick="sendRequest()">立即發送預約</button>

  <script>
    var directionsService;
    var PRICING = { baseFare: 150, baseKm: 5, perKm: 35 };
    var currentKm = 0;
    var currentPrice = 0;

    // 1. Google Maps 初始化 (由 API 自動呼叫)
    function initMap() {
      directionsService = new google.maps.DirectionsService();
      var opts = { componentRestrictions: { country: "tw" } };
      
      var p1 = new google.maps.places.Autocomplete(document.getElementById('pickup'), opts);
      var p2 = new google.maps.places.Autocomplete(document.getElementById('dropoff'), opts);

      p1.addListener('place_changed', safeCalc);
      p2.addListener('place_changed', safeCalc);
      console.log("Google Maps Ready");
    }

    // 2. 防呆計算函式
    function safeCalc() {
      var start = document.getElementById('pickup').value;
      var end = document.getElementById('dropoff').value;

      if (!start || !end || !directionsService) return;

      directionsService.route({
        origin: start,
        destination: end,
        travelMode: google.maps.TravelMode.DRIVING
      }, function(res, status) {
        if (status === 'OK') {
          var meters = res.routes[0].legs[0].distance.value;
          currentKm = meters / 1000;
          
          var price = PRICING.baseFare;
          if (currentKm > PRICING.baseKm) price += (currentKm - PRICING.baseKm) * PRICING.perKm;
          currentPrice = Math.round(price);

          document.getElementById('price-preview').style.display = 'block';
          document.getElementById('dist-val').innerText = currentKm.toFixed(1);
          document.getElementById('price-val').innerText = currentPrice;
        }
      });
    }

    // 3. 其他全域函式
    function setType(t, b) {
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAni5ZB9eIS44B0NaMFCRpzNhFPiBu1MjY&libraries=places&callback=initMap" async defer></script>

  <script type="module">
    import { db, CONFIG } from './firebase-config.js?v=106';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.sendRequest = async function() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      try {
        const data = {
          pickup: document.getElementById('pickup').value,
          dropoff: document.getElementById('dropoff').value,
          estimateDistance: currentKm.toFixed(1),
          estimatePrice: currentPrice,
          status: "pending"
        };
        await addDoc(collection(db, "orders"), { ...data, createdAt: serverTimestamp() });
        alert("預約已送出");
      } catch (e) {
        alert("錯誤: " + e.message);
        btn.disabled = false;
      }
    };

    liff.init({ liffId: CONFIG.LIFF_IDS.PASSENGER });
  </script>
</body>
</html>
