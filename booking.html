<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #F5F5F7; }
    .card { background: #FFF; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #DDD; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background: #007AFF; color: #FFF; border: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <input type="text" id="contact-name" placeholder="聯絡人">
    <input type="tel" id="contact-phone" placeholder="電話">
    <input type="text" id="pickup" placeholder="上車地點">
    <input type="text" id="dropoff" placeholder="下車地點">
    <button id="submit-btn" onclick="sendRequest()">確認預約</button>
  </div>

  <script type="module">
    import { db, CONFIG } from './firebase-config.js?v=105';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let uid = "";
    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_IDS.PASSENGER });
        if (liff.isLoggedIn()) {
          const p = await liff.getProfile();
          uid = p.userId;
          document.getElementById('contact-name').value = p.displayName;
        }
      } catch (e) { console.warn("LIFF Init Fail"); }
    }

    window.sendRequest = async () => {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = "提交中...";
      try {
        const data = {
          customerId: uid,
          contactName: document.getElementById('contact-name').value,
          pickup: document.getElementById('pickup').value,
          dropoff: document.getElementById('dropoff').value,
          status: 'pending'
        };
        const docRef = await addDoc(collection(db, "orders"), { ...data, createdAt: serverTimestamp() });
        await fetch(CONFIG.webhooks.newOrder, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ...data, orderId: docRef.id })
        });
        alert("預約成功");
        window.parent.postMessage('booking_success', '*');
      } catch (e) {
        alert("失敗: " + e.message);
        btn.disabled = false; btn.innerText = "重新預約";
      }
    };
    init();
  </script>
</body>
</html>
