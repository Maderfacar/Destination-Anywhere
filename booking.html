<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預約行程</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #007AFF; --bg: #F2F2F7; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1C1C1E; }
    .type-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .tab-btn { background: #FFF; border: none; padding: 12px 5px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #8E8E93; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--primary); color: #FFF; }
    .card { background: #FFF; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .label-row { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; font-size: 15px; }
    input, textarea { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #F9F9F9; -webkit-appearance: none; }
    #midStops-container { display: none; margin-bottom: 15px; position: relative; }
    .add-stop-btn { color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; display: inline-block; margin-bottom: 15px; }
    .del-stop-btn { position: absolute; right: 10px; top: 38px; color: #FF3B30; font-weight: bold; padding: 10px; z-index: 5; }
    .counter-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .counter-label { font-size: 15px; color: #3A3A3C; }
    .counter-ctrl { display: flex; align-items: center; gap: 15px; }
    .btn-circle { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--primary); background: #FFF; color: var(--primary); font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .count-num { font-size: 18px; font-weight: 600; min-width: 20px; text-align: center; }
    .submit-area { margin-top: 30px; }
    #submit-btn { width: 100%; padding: 18px; background: var(--primary); color: #FFF; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #price-preview { display: none; margin-top: 15px; padding: 15px; background: #F2F9FF; border-radius: 12px; border: 1.5px dashed var(--primary); }
    .price-text { color: #D70015; font-size: 20px; font-weight: 800; }
  </style>
</head>
<body>

  <div class="type-tabs">
    <button class="tab-btn active" onclick="setType('接機', this)">接機</button>
    <button class="tab-btn" onclick="setType('送機', this)">送機</button>
    <button class="tab-btn" onclick="setType('市區接送', this)">市區</button>
    <button class="tab-btn" onclick="setType('包車旅遊', this)">包車</button>
  </div>

  <div class="card">
    <div class="form-group" style="margin-bottom:15px;">
      <div class="label-row">上車地點</div>
      <input type="text" id="pickup" placeholder="請輸入起點或航廈">
    </div>

    <div id="midStops-container">
      <div class="label-row">中途停靠站</div>
      <input type="text" id="midStops" placeholder="請輸入停靠地點">
      <span class="del-stop-btn" onclick="toggleMidStop(false)">✕</span>
    </div>
    <div class="add-stop-btn" id="add-btn" onclick="toggleMidStop(true)">+ 新增停靠站</div>

    <div class="form-group">
      <div class="label-row">下車地點</div>
      <input type="text" id="dropoff" placeholder="請輸入目的地">
    </div>

    <div id="price-preview">
      <div style="font-size: 13px; color: #8E8E93;">系統預估里程：<span id="dist-val">0</span> km</div>
      <div style="margin-top: 5px;">預估車資：<span class="price-text">$ <span id="price-val">0</span></span></div>
    </div>
  </div>

  <div class="card">
    <div class="grid-2">
      <div class="form-group">
        <div class="label-row">預約時間</div>
        <input type="datetime-local" id="appointmentTime">
      </div>
      <div class="form-group">
        <div class="label-row">航班號碼</div>
        <input type="text" id="flightNo" placeholder="CX450">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="counter-group">
      <span class="counter-label">成人人數</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('adults', -1)">-</div>
        <span class="count-num" id="val-adults">1</span>
        <div class="btn-circle" onclick="change('adults', 1)">+</div>
      </div>
    </div>
    <div class="counter-group">
      <span class="counter-label">兒童人數</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('children', -1)">-</div>
        <span class="count-num" id="val-children">0</span>
        <div class="btn-circle" onclick="change('children', 1)">+</div>
      </div>
    </div>
    <div style="height:1px; background:#F2F2F7; margin:15px 0;"></div>
    <div class="counter-group">
      <span class="counter-label">大型行李 (28吋以上)</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('lugL', -1)">-</div>
        <span class="count-num" id="val-lugL">0</span>
        <div class="btn-circle" onclick="change('lugL', 1)">+</div>
      </div>
    </div>
    <div class="counter-group">
      <span class="counter-label">中型行李 (24-26吋)</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('lugM', -1)">-</div>
        <span class="count-num" id="val-lugM">0</span>
        <div class="btn-circle" onclick="change('lugM', 1)">+</div>
      </div>
    </div>
    <div class="counter-group">
      <span class="counter-label">小型行李 (20吋以下)</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('lugS', -1)">-</div>
        <span class="count-num" id="val-lugS">0</span>
        <div class="btn-circle" onclick="change('lugS', 1)">+</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="grid-2">
      <div class="form-group">
        <div class="label-row">聯絡姓名</div>
        <input type="text" id="contactName">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <div class="label-row">聯絡電話</div>
          <input type="tel" id="contactPhone">
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-top:10px;">
      <textarea id="note" rows="2" placeholder="如推車、滑雪板、球具…等大型拖運需求"></textarea>
    </div>
  </div>

  <div class="submit-area">
    <button id="submit-btn" onclick="sendRequest()">立即發送預約行程</button>
  </div>

  <script type="module">
    import { db, CONFIG } from './firebase-config.js?v=106';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const PRICING_CONFIG = { baseFare: 150, baseKm: 5, perKm: 35 };
    let currentKm = 0;
    let currentEstimatePrice = 0;

    // 🟢 2026 最新版初始化方式：使用 Routes 庫
    window.initMap = async () => {
      const { Autocomplete } = await google.maps.importLibrary("places");
      const { RoutesService } = await google.maps.importLibrary("routes");
      
      const routesService = new RoutesService();
      const options = { 
        componentRestrictions: { country: "tw" }, 
        fields: ["formatted_address", "geometry", "name"],
        types: ["establishment", "geocode"] 
      };

      const pickupAuto = new Autocomplete(document.getElementById('pickup'), options);
      const midAuto = new Autocomplete(document.getElementById('midStops'), options);
      const dropoffAuto = new Autocomplete(document.getElementById('dropoff'), options);

      const handleCalc = async () => {
        const origin = document.getElementById('pickup').value;
        const dest = document.getElementById('dropoff').value;
        const mid = document.getElementById('midStops').value;

        if (!origin || !dest) return;

        // 使用 2026 推薦的 computeRouteMatrix 或 Directions 邏輯簡化版
        const ds = new google.maps.DirectionsService();
        const waypoints = mid ? [{ location: mid, stopover: true }] : [];
        
        ds.route({
          origin: origin,
          destination: dest,
          waypoints: waypoints,
          travelMode: google.maps.TravelMode.DRIVING
        }, (result, status) => {
          if (status === 'OK') {
            let totalMeters = 0;
            result.routes[0].legs.forEach(leg => { totalMeters += leg.distance.value; });
            currentKm = totalMeters / 1000;
            updatePriceUI(currentKm);
          }
        });
      };

      pickupAuto.addListener('place_changed', handleCalc);
      midAuto.addListener('place_changed', handleCalc);
      dropoffAuto.addListener('place_changed', handleCalc);
      
      // 曝露給全域以利手動調用
      window.calculateDistance = handleCalc;
    };

    function updatePriceUI(km) {
      let price = PRICING_CONFIG.baseFare;
      if (km > PRICING_CONFIG.baseKm) price += (km - PRICING_CONFIG.baseKm) * PRICING_CONFIG.perKm;
      currentEstimatePrice = Math.round(price);
      document.getElementById('price-preview').style.display = 'block';
      document.getElementById('dist-val').innerText = km.toFixed(1);
      document.getElementById('price-val').innerText = currentEstimatePrice;
    }

    // --- LIFF & Firebase 邏輯 ---
    let customerUid = new URLSearchParams(window.location.search).get('uid') || "";
    let selectedType = "接機";
    const counts = { adults: 1, children: 0, lugL: 0, lugM: 0, lugS: 0 };

    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_IDS.PASSENGER });
        if (liff.isLoggedIn()) {
          const p = await liff.getProfile();
          customerUid = p.userId;
          document.getElementById('contactName').value = p.displayName || "";
        } else { liff.login(); }
      } catch (e) { console.warn("LIFF Failed"); }
    }

    window.setType = (type, btn) => {
      selectedType = type;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    window.toggleMidStop = (show) => {
      document.getElementById('midStops-container').style.display = show ? 'block' : 'none';
      document.getElementById('add-btn').style.display = show ? 'none' : 'inline-block';
      if (!show) { document.getElementById('midStops').value = ""; window.calculateDistance(); }
    };
    window.change = (key, delta) => {
      counts[key] = Math.max((key === 'adults' ? 1 : 0), counts[key] + delta);
      document.getElementById(`val-${key}`).innerText = counts[key];
    };
    window.sendRequest = async () => {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = "處理中...";
      try {
        const data = {
          tripType: selectedType,
          contactName: document.getElementById('contactName').value,
          contactPhone: document.getElementById('contactPhone').value,
          appointmentTime: document.getElementById('appointmentTime').value.replace('T', ' '),
          flightNo: document.getElementById('flightNo').value,
          pickup: document.getElementById('pickup').value,
          midStops: document.getElementById('midStops').value,
          dropoff: document.getElementById('dropoff').value,
          adults: String(counts.adults), children: String(counts.children),
          lugL: String(counts.lugL), lugM: String(counts.lugM), lugS: String(counts.lugS),
          note: document.getElementById('note').value,
          customerId: customerUid, status: "pending",
          estimateDistance: currentKm.toFixed(1), estimatePrice: currentEstimatePrice
        };
        const docRef = await addDoc(collection(db, "orders"), { ...data, createdAt: serverTimestamp() });
        await fetch(CONFIG.webhooks.newOrder, { method: 'POST', body: JSON.stringify({ ...data, orderId: docRef.id }) });
        alert("預約成功！");
        window.parent.postMessage('booking_success', '*');
      } catch (e) { alert("失敗: " + e.message); btn.disabled = false; }
    };

    init();
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAni5ZB9eIS44B0NaMFCRpzNhFPiBu1MjY&libraries=places&callback=initMap&v=beta" async defer></script>
</body>
</html>
