<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預約行程</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #007AFF; --bg: #F2F2F7; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1C1C1E; }
    .card { background: #FFF; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .label-row { font-weight: 600; margin-bottom: 8px; display: block; font-size: 15px; }
    input { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; background: #F9F9F9; }
    /* 藍色價格框 */
    #price-preview { display: none; margin-top: 15px; padding: 15px; background: #F2F9FF; border-radius: 12px; border: 1.5px dashed var(--primary); text-align: center; }
    .price-text { color: #D70015; font-size: 26px; font-weight: 800; }
    .add-stop { color: var(--primary); font-size: 14px; cursor: pointer; font-weight: 600; margin-bottom: 15px; display: inline-block; }
    .counter-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .counter-ctrl { display: flex; align-items: center; gap: 15px; }
    .btn-circle { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--primary); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
    #submit-btn { width: 100%; padding: 18px; background: var(--primary); color: #FFF; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; }
    #submit-btn:disabled { background: #AEAEB2; }
  </style>
</head>
<body>

  <div class="card">
    <span class="label-row">上車地點</span>
    <input type="text" id="pickup" placeholder="請選擇起點">
    
    <div id="mid-wrap" style="display:none;">
      <span class="label-row">中途停靠 (會增加費用)</span>
      <input type="text" id="midStops" placeholder="請選擇停靠點">
    </div>
    <span class="add-stop" id="add-btn" onclick="toggleMid(true)">+ 新增停靠站</span>

    <span class="label-row">下車地點</span>
    <input type="text" id="dropoff" placeholder="請選擇終點">

    <div id="price-preview">
      <div style="font-size: 13px; color: #666;">系統預估里程：<span id="dist-val">0</span> km</div>
      <div style="margin-top: 5px;"><span class="price-text">$ <span id="price-val">0</span></span></div>
      <div style="font-size: 12px; color: #8E8E93; margin-top: 5px;">*最終車資以司機回報為準</div>
    </div>
  </div>

  <div class="card">
    <div class="counter-group">
      <span>成人人數</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('adults', -1)">-</div>
        <span id="val-adults">1</span>
        <div class="btn-circle" onclick="change('adults', 1)">+</div>
      </div>
    </div>
    <div class="counter-group">
      <span>行李數量</span>
      <div class="counter-ctrl">
        <div class="btn-circle" onclick="change('lugs', -1)">-</div>
        <span id="val-lugs">0</span>
        <div class="btn-circle" onclick="change('lugs', 1)">+</div>
      </div>
    </div>
  </div>

  <button id="submit-btn" onclick="sendOrder()">立即預約</button>

  <script>
    let directionsService;
    const PRICING = { baseFare: 150, baseKm: 5, perKm: 35 }; // 這邊可以隨意調整你的計費邏輯
    const counts = { adults: 1, lugs: 0 };

    function initMap() {
      directionsService = new google.maps.DirectionsService();
      const opts = { componentRestrictions: { country: "tw" } };
      
      const p1 = new google.maps.places.Autocomplete(document.getElementById('pickup'), opts);
      const p2 = new google.maps.places.Autocomplete(document.getElementById('midStops'), opts);
      const p3 = new google.maps.places.Autocomplete(document.getElementById('dropoff'), opts);

      const trigger = () => calculate();
      p1.addListener('place_changed', trigger);
      p2.addListener('place_changed', trigger);
      p3.addListener('place_changed', trigger);
      console.log("Map System Ready");
    }

    function calculate() {
      const origin = document.getElementById('pickup').value;
      const dest = document.getElementById('dropoff').value;
      const mid = document.getElementById('midStops').value;

      if (!origin || !dest || !directionsService) return;

      const waypoints = mid ? [{ location: mid, stopover: true }] : [];

      directionsService.route({
        origin: origin,
        destination: dest,
        waypoints: waypoints,
        travelMode: google.maps.TravelMode.DRIVING
      }, (res, status) => {
        if (status === 'OK') {
          let totalDistance = 0;
          res.routes[0].legs.forEach(leg => totalDistance += leg.distance.value);
          
          const km = totalDistance / 1000;
          let price = PRICING.baseFare;
          if (km > PRICING.baseKm) price += (km - PRICING.baseKm) * PRICING.perKm;

          document.getElementById('price-preview').style.display = 'block';
          document.getElementById('dist-val').innerText = km.toFixed(1);
          document.getElementById('price-val').innerText = Math.round(price);
        } else {
          console.error("Directions Error:", status);
        }
      });
    }

    function change(key, delta) {
      counts[key] = Math.max((key === 'adults' ? 1 : 0), counts[key] + delta);
      document.getElementById(`val-${key}`).innerText = counts[key];
    }

    function toggleMid(show) {
      document.getElementById('mid-wrap').style.display = show ? 'block' : 'none';
      document.getElementById('add-btn').style.display = show ? 'none' : 'inline-block';
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAni5ZB9eIS44B0NaMFCRpzNhFPiBu1MjY&libraries=places&callback=initMap" async defer></script>

  <script type="module">
    import { db, CONFIG } from './firebase-config.js?v=106';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.sendOrder = async function() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = "預約中...";
      
      try {
        const data = {
          pickup: document.getElementById('pickup').value,
          dropoff: document.getElementById('dropoff').value,
          midStops: document.getElementById('midStops').value,
          adults: counts.adults,
          lugs: counts.lugs,
          price: document.getElementById('price-val').innerText,
          status: "pending",
          createdAt: serverTimestamp()
        };
        await addDoc(collection(db, "orders"), data);
        alert("預約成功！司機將儘速聯繫您。");
        liff.closeWindow();
      } catch (e) {
        alert("預約失敗: " + e.message);
        btn.disabled = false;
        btn.innerText = "立即預約";
      }
    };

    liff.init({ liffId: CONFIG.LIFF_IDS.PASSENGER });
  </script>
</body>
</html>
