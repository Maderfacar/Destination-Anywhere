<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 司機控制台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="style.css?v=1">

  <style>
    /* 2. 僅保留司機端特有的功能性樣式 */
    .file-group { 
      background: #F8F8F8; padding: 12px; border-radius: 12px; 
      border: 1px dashed var(--border); margin-bottom: 12px; 
    }
    .file-group input[type="file"] { background: transparent; border: none; padding: 5px 0; font-size: 13px; margin-bottom: 0; }

    /* 訂單狀態回報按鈕組 */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-status { 
      font-size: 13px; padding: 12px; background: #F2F2F7; color: var(--text-main); 
      border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s;
    }
    .btn-status.active { background: var(--apple-green); color: white; border-color: var(--apple-green); font-weight: bold; }

    .order-info-box { font-size: 14px; line-height: 1.6; border-bottom: 1px solid #EEE; padding-bottom: 12px; margin-bottom: 12px; }
    
    #loading { text-align: center; padding-top: 100px; color: var(--text-sub); }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div id="loading">🚀 正在啟動 DA 司機系統...</div>

<div id="section-register" class="hide" style="padding: 15px;">
  <div class="section-title">📝 司機加盟申請</div>
  <div class="card">
    <label class="input-label">真實姓名</label>
    <input type="text" id="reg-name" placeholder="請輸入姓名">
    
    <label class="input-label">手機號碼</label>
    <input type="tel" id="reg-phone" placeholder="09xx-xxx-xxx">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div><label class="input-label">車型</label><input type="text" id="reg-model" placeholder="例: Lexus ES"></div>
      <div><label class="input-label">車色</label><input type="text" id="reg-color" placeholder="顏色"></div>
    </div>
    
    <label class="input-label">車牌號碼</label>
    <input type="text" id="reg-plate" placeholder="例如: ABC-1234">
    
    <div class="file-group">
      <label class="input-label">🪪 駕照正反面照片</label>
      <input type="file" id="file-license" accept="image/*">
    </div>
    <div class="file-group">
      <label class="input-label">📄 行照照片</label>
      <input type="file" id="file-registration" accept="image/*">
    </div>
    <div class="file-group">
      <label class="input-label">🛡️ 保險證明照片</label>
      <input type="file" id="file-insurance" accept="image/*">
    </div>
    
    <button class="btn btn-blue" id="reg-submit" onclick="handleRegister()">送出加盟申請</button>
  </div>
</div>

<div id="section-pending" class="hide" style="padding: 15px;">
  <div class="card" style="text-align: center; padding: 50px 20px;">
    <div style="font-size: 48px; margin-bottom: 15px;">⌛</div>
    <h3 style="margin: 0;">申請審核中</h3>
    <p style="color: var(--text-sub); font-size: 14px; margin-top: 10px;">資料已提交，請靜候管理員核准。</p>
    <button class="btn btn-outline" onclick="location.reload()" style="margin-top: 25px;">重新整理狀態</button>
  </div>
</div>

<div id="section-main" class="hide" style="padding: 15px;">
  <div class="section-title">👤 司機與車輛資訊</div>
  <div class="card">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div><label class="input-label">姓名</label><input type="text" id="edit-name"></div>
      <div><label class="input-label">車牌</label><input type="text" id="edit-plate"></div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div><label class="input-label">車型</label><input type="text" id="edit-model"></div>
      <div><label class="input-label">車色</label><input type="text" id="edit-color"></div>
    </div>
    <label class="input-label">手機號碼</label>
    <input type="tel" id="edit-phone">
    <button class="btn btn-outline" onclick="updateDriverProfile()" style="font-size: 13px; padding: 10px;">儲存變更資料</button>
  </div>

  <div class="section-title">📅 我的派單行程</div>
  <div id="orders-list"></div>
</div>

<script type="module">
  // JS 邏輯暫不變動
  import { CONFIG } from './config.js?v=5';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // ... (其餘邏輯與您原本的完全相同) ...
</script>
</body>
</html>
