<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司機接單中心</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background: #2c3e50; color: white; text-align: center; font-family: sans-serif;">
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyCg7ONT1mDIXZplNhTKPHw-cn5UbXFQJyk", authDomain: "destination-anywhere-cfd50.firebaseapp.com", projectId: "destination-anywhere-cfd50", appId: "1:718691467645:web:fb37ce5fa5708c1f788c14" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const q = query(collection(db, "orders"), where("status", "==", "等待接單"));
onSnapshot(q, (s) => {
const l = document.getElementById('list');
l.innerHTML = s.empty ? '<p>目前沒有新訂單</p>' : '';
s.forEach((d) => {
const data = d.data();
const item = document.createElement('div');
item.className = 'order-card';
item.innerHTML = `<p>👤 乘客：${data.name}</p><p>📍 起點：${data.from}</p><p>🏁 終點：${data.to}</p><button class="btn" onclick="acceptOrder('${d.id}')">我要接單</button>`;
l.appendChild(item);

});
});
window.acceptOrder = async (id) => {
try {
await updateDoc(doc(db, "orders", id), { status: "司機已接單" });
alert("接單成功！");
} catch (e) { alert("失敗"); }
};
    
  </script>
<h1>🚖 司機接單中心</h1>
<div id="list">正在搜尋訂單...</div>
</body>
</html>
