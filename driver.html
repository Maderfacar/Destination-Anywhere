<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 司機控制台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    .file-group { background: #F8F8F8; padding: 12px; border-radius: 12px; border: 1px dashed #DDD; margin-bottom: 12px; }
    .file-group input[type="file"] { background: transparent; border: none; padding: 5px 0; font-size: 13px; margin-bottom: 0; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-status { font-size: 13px; padding: 12px; background: #F2F2F7; color: #000; border: 1px solid #DDD; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .btn-status.active { background: #34C759; color: white; border-color: #34C759; font-weight: bold; }
    .order-info-box { font-size: 14px; line-height: 1.6; border-bottom: 1px solid #EEE; padding-bottom: 12px; margin-bottom: 12px; }
    #loading { text-align: center; padding-top: 100px; color: #8E8E93; }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div id="loading">🚀 正在驗證司機權限...</div>

<div id="section-register" class="hide" style="padding: 15px;">
  <div class="section-title">📝 司機加盟申請</div>
  <div class="card">
    <label class="input-label">真實姓名</label>
    <input type="text" id="reg-name" placeholder="請輸入姓名">
    <label class="input-label">手機號碼</label>
    <input type="tel" id="reg-phone" placeholder="09xx-xxx-xxx">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div><label class="input-label">車型</label><input type="text" id="reg-model" placeholder="例: Lexus ES"></div>
      <div><label class="input-label">車色</label><input type="text" id="reg-color" placeholder="顏色"></div>
    </div>
    <label class="input-label">車牌號碼</label>
    <input type="text" id="reg-plate" placeholder="例如: ABC-1234">
    <div class="file-group">
      <label class="input-label">🪪 駕照正反面照片</label>
      <input type="file" id="file-license" accept="image/*">
    </div>
    <button class="btn btn-blue" id="reg-submit" onclick="handleRegister()">送出加盟申請</button>
  </div>
</div>

<div id="section-pending" class="hide" style="padding: 15px;">
  <div class="card" style="text-align: center; padding: 50px 20px;">
    <div style="font-size: 48px; margin-bottom: 15px;">⌛</div>
    <h3>申請審核中</h3>
    <p style="color: #8E8E93; font-size: 14px; margin-top: 10px;">資料已提交，請靜候管理員核准。</p>
    <button class="btn btn-outline" onclick="location.reload()">重新整理</button>
  </div>
</div>

<div id="section-main" class="hide" style="padding: 15px;">
  <div class="section-title">👤 司機資訊</div>
  <div class="card">
    <div style="font-weight: bold; font-size: 18px;" id="disp-name">--</div>
    <div style="color: #666; font-size: 14px; margin-top: 5px;" id="disp-car">--</div>
  </div>
  <div class="section-title">📅 我的派單行程</div>
  <div id="orders-list"></div>
</div>

<script type="module">
  import { db, storage, CONFIG } from './firebase-config.js?v=1';
  import { doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  let myUID = "";

  async function init() {
    try {
      const DRIVER_LIFF_ID = "2009434590-3t2KvScf";
      await liff.init({ liffId: DRIVER_LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      const profile = await liff.getProfile();
      myUID = profile.userId;
      
      // 改用 onSnapshot 即時監聽，解決跳轉後沒更新的問題
      onSnapshot(doc(db, "drivers", myUID), (snap) => {
        document.getElementById('loading').classList.add('hide');
        
        if (!snap.exists()) {
          showSection('section-register');
        } else {
          const data = snap.data();
          if (data.status === 'pending') {
            showSection('section-pending');
          } else {
            showSection('section-main');
            document.getElementById('disp-name').innerText = data.name;
            document.getElementById('disp-car').innerText = `${data.plate} (${data.model})`;
            loadOrders(data.name);
          }
        }
      });
    } catch (err) {
      document.getElementById('loading').innerHTML = "初始化錯誤: " + err.message;
    }
  }

  function showSection(id) {
    ['section-register', 'section-pending', 'section-main'].forEach(s => document.getElementById(s).classList.add('hide'));
    document.getElementById(id).classList.remove('hide');
  }

  window.handleRegister = async () => {
    const btn = document.getElementById('reg-submit');
    const name = document.getElementById('reg-name').value;
    if(!name || !document.getElementById('reg-phone').value) return alert("請填寫必填欄位");

    btn.disabled = true;
    btn.innerText = "提交中...";

    try {
      let licenseUrl = "";
      const file = document.getElementById('file-license').files[0];
      if (file) {
        const sRef = ref(storage, `drivers/${myUID}/license`);
        await uploadBytes(sRef, file);
        licenseUrl = await getDownloadURL(sRef);
      }

      await setDoc(doc(db, "drivers", myUID), {
        name,
        phone: document.getElementById('reg-phone').value,
        plate: document.getElementById('reg-plate').value,
        model: document.getElementById('reg-model').value,
        color: document.getElementById('reg-color').value,
        licenseImg: licenseUrl,
        status: 'pending',
        createdAt: serverTimestamp()
      });
      // onSnapshot 會自動處理切換到 pending 畫面
    } catch (e) {
      alert("提交失敗: " + e.message);
      btn.disabled = false;
    }
  };

  function loadOrders(driverName) {
    const q = query(collection(db, "orders"), where("driverName", "==", driverName));
    onSnapshot(q, (snap) => {
      const list = document.getElementById('orders-list');
      list.innerHTML = snap.empty ? '<div class="card">目前尚無派單</div>' : '';
      snap.forEach(d => {
        const ord = d.data();
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="order-info-box"><b>${ord.tripType}</b><br>客戶：${ord.contactName}<br>起點：${ord.pickupLocation}</div>
          <div class="status-grid">
            <button class="btn-status ${ord.driverStatus==='onWay'?'active':''}" onclick="updateStatus('${d.id}','onWay')">前往中</button>
            <button class="btn-status ${ord.driverStatus==='completed'?'active':''}" onclick="updateStatus('${d.id}','completed')">結束行程</button>
          </div>
        `;
        list.appendChild(div);
      });
    });
  }

  window.updateStatus = (id, s) => updateDoc(doc(db, "orders", id), { driverStatus: s });

  init();
</script>
</body>
</html>
