<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>司機專區 - Destination Anywhere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-map-marked-alt me-2"></i>Destination Anywhere
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">首頁</a>
                <a class="nav-link" href="booking.html">預訂行程</a>
                <a class="nav-link active" href="#">司機專區</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">
            <i class="fas fa-id-card me-2"></i>司機專區
        </h1>

        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">今日行程</h5>
                    </div>
                    <div class="card-body">
                        <div id="todayTrips">
                            <div class="alert alert-info">
                                <i class="fas fa-info-circle me-2"></i>
                                今日暫無排程行程
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">可用行程</h5>
                    </div>
                    <div class="card-body">
                        <div id="availableTrips">
                            <div class="trip-item mb-3 p-3 border rounded">
                                <div class="row align-items-center">
                                    <div class="col-md-8">
                                        <h6>台北車站 → 桃園機場</h6>
                                        <p class="text-muted mb-1">
                                            <i class="fas fa-calendar me-1"></i>2024-04-24 14:30
                                        </p>
                                        <p class="text-muted mb-0">
                                            <i class="fas fa-users me-1"></i>2位乘客
                                        </p>
                                    </div>
                                    <div class="col-md-4 text-end">
                                        <h5 class="text-primary">$800</h5>
                                        <button class="btn btn-success btn-sm" onclick="acceptTrip('001')">
                                            <i class="fas fa-check me-1"></i>接受
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="trip-item mb-3 p-3 border rounded">
                                <div class="row align-items-center">
                                    <div class="col-md-8">
                                        <h6>信義區 → 松山機場</h6>
                                        <p class="text-muted mb-1">
                                            <i class="fas fa-calendar me-1"></i>2024-04-24 16:00
                                        </p>
                                        <p class="text-muted mb-0">
                                            <i class="fas fa-users me-1"></i>1位乘客
                                        </p>
                                    </div>
                                    <div class="col-md-4 text-end">
                                        <h5 class="text-primary">$400</h5>
                                        <button class="btn btn-success btn-sm" onclick="acceptTrip('002')">
                                            <i class="fas fa-check me-1"></i>接受
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">司機資訊</h5>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-3">
                            <div class="avatar-circle bg-primary text-white d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 80px; height: 80px;">
                                <i class="fas fa-user fa-2x"></i>
                            </div>
                        </div>
                        <h6 class="text-center">李司機</h6>
                        <p class="text-center text-muted">車牌: ABC-1234</p>
                        <div class="d-flex justify-content-around text-center">
                            <div>
                                <h5 class="text-primary">4.8</h5>
                                <small class="text-muted">評分</small>
                            </div>
                            <div>
                                <h5 class="text-success">156</h5>
                                <small class="text-muted">趟次</small>
                            </div>
                            <div>
                                <h5 class="text-info">2年</h5>
                                <small class="text-muted">經驗</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">今日統計</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <span>完成趟次</span>
                                <strong>3</strong>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <span>今日收入</span>
                                <strong class="text-success">$1,800</strong>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <span>工作時數</span>
                                <strong>4.5小時</strong>
                            </div>
                        </div>
                        <div class="mb-0">
                            <div class="d-flex justify-content-between">
                                <span>平均評分</span>
                                <strong class="text-primary">4.9</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">快速操作</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-clock me-2"></i>更新狀態
                            </button>
                            <button class="btn btn-outline-success">
                                <i class="fas fa-phone me-2"></i>聯絡客服
                            </button>
                            <button class="btn btn-outline-info">
                                <i class="fas fa-history me-2"></i>行程記錄
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // 司機專區功能
        function acceptTrip(tripId) {
            if (confirm('確定要接受這個行程嗎？')) {
                // 更新UI
                const tripElement = event.target.closest('.trip-item');
                tripElement.style.opacity = '0.5';
                event.target.disabled = true;
                event.target.textContent = '已接受';
                
                // 保存到Firebase
                if (window.db) {
                    window.db.collection('trips').doc(tripId).update({
                        status: 'accepted',
                        driverId: 'current_driver_id',
                        acceptedAt: new Date()
                    }).then(() => {
                        // 移除可用行程
                        setTimeout(() => {
                            tripElement.remove();
                            updateTodayTrips();
                        }, 1000);
                    }).catch(error => {
                        console.error('Error:', error);
                        alert('接受行程失敗');
                    });
                } else {
                    // 模擬接受
                    setTimeout(() => {
                        tripElement.remove();
                        updateTodayTrips();
                    }, 1000);
                }
            }
        }

        function updateTodayTrips() {
            const todayTripsElement = document.getElementById('todayTrips');
            // 這裡應該從Firebase獲取今日已接受的行程
            // 暫時使用靜態資料
            todayTripsElement.innerHTML = `
                <div class="trip-item mb-3 p-3 border rounded bg-success bg-opacity-10">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h6>台北車站 → 桃園機場</h6>
                            <p class="text-muted mb-1">
                                <i class="fas fa-calendar me-1"></i>2024-04-24 14:30
                            </p>
                            <p class="text-muted mb-0">
                                <i class="fas fa-users me-1"></i>2位乘客
                            </p>
                        </div>
                        <div class="col-md-4 text-end">
                            <span class="badge bg-success">已接受</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 載入可用行程
            if (window.db) {
                window.db.collection('trips')
                    .where('status', '==', 'pending')
                    .where('date', '==', new Date().toISOString().split('T')[0])
                    .get()
                    .then(snapshot => {
                        const availableTripsElement = document.getElementById('availableTrips');
                        if (snapshot.empty) {
                            availableTripsElement.innerHTML = `
                                <div class="alert alert-info">
                                    <i class="fas fa-info-circle me-2"></i>
                                    目前沒有可用的行程
                                </div>
                            `;
                        }
                    });
            }
        });
    </script>
</body>
</html>
