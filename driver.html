<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DA 司機控制台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    .file-group { background: #F8F8F8; padding: 12px; border-radius: 12px; border: 1px dashed #DDD; margin-bottom: 12px; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-status { font-size: 13px; padding: 12px; background: #F2F2F7; color: #000; border: 1px solid #DDD; border-radius: 12px; cursor: pointer; }
    .btn-status.active { background: #34C759; color: white; border-color: #34C759; font-weight: bold; }
    #loading { text-align: center; padding-top: 100px; color: #8E8E93; font-family: sans-serif; }
    .hide { display: none !important; }
    .error-box { padding: 20px; color: #FF3B30; background: #FFF2F2; border-radius: 12px; margin: 20px; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>

<div id="loading">🚀 司機系統啟動中...</div>
<div id="error-display" class="hide"></div>

<div id="section-register" class="hide" style="padding: 15px;">
  <div class="section-title">📝 司機加盟申請</div>
  <div class="card">
    <label class="input-label">真實姓名</label>
    <input type="text" id="reg-name" placeholder="請輸入姓名">
    <label class="input-label">手機號碼</label>
    <input type="tel" id="reg-phone" placeholder="09xx-xxx-xxx">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div><label class="input-label">車型</label><input type="text" id="reg-model" placeholder="例: Lexus ES"></div>
      <div><label class="input-label">車色</label><input type="text" id="reg-color" placeholder="顏色"></div>
    </div>
    <label class="input-label">車牌號碼</label>
    <input type="text" id="reg-plate" placeholder="例如: ABC-1234">
    
    <div class="file-group">
      <label class="input-label">🪪 駕照正反面照片</label>
      <input type="file" id="file-license" accept="image/*">
    </div>
    
    <div class="file-group">
      <label class="input-label">🚗 行照照片</label>
      <input type="file" id="file-registration" accept="image/*">
    </div>
    
    <div class="file-group">
      <label class="input-label">🛡️ 保險證明照片</label>
      <input type="file" id="file-insurance" accept="image/*">
    </div>

    <button class="btn btn-blue" id="reg-submit">送出加盟申請</button>
  </div>
</div>

<div id="section-pending" class="hide" style="padding: 15px;">
  <div class="card" style="text-align: center; padding: 50px 20px;">
    <div style="font-size: 48px; margin-bottom: 15px;">⌛</div>
    <h3>申請審核中</h3>
    <p style="color: #8E8E93; font-size: 14px;">您的資料正在排隊審核，請稍後。</p>
    <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px;">重新整理</button>
  </div>
</div>

<div id="section-main" class="hide" style="padding: 15px;">
  <div class="section-title">👤 司機資訊</div>
  <div class="card">
    <div style="font-weight: bold; font-size: 18px;" id="disp-name">--</div>
    <div style="color: #666; font-size: 14px;" id="disp-car">--</div>
  </div>
  <div class="section-title">📅 我的派單行程</div>
  <div id="orders-list"></div>
</div>

<script type="module">
  import { db, storage, CONFIG } from './firebase-config.js?v=1';
  import { doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // 已更新為新 Provider (209) 下的司機專用 LIFF ID
  const DRIVER_LIFF_ID = "2009509209-2hGUMoYt"; 

  async function start() {
    const loader = document.getElementById('loading');
    const errEl = document.getElementById('error-display');

    try {
      await liff.init({ liffId: DRIVER_LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login(); 
        return;
      }

      const profile = await liff.getProfile();
      const uid = profile.userId;

      // 即時監聽司機狀態
      onSnapshot(doc(db, "drivers", uid), (snap) => {
        loader.classList.add('hide');
        if (!snap.exists()) {
          showSection('section-register');
          setupRegister(uid);
        } else {
          const data = snap.data();
          
          // 更換 Provider 檢查點：確保資料庫中的 userId 永遠是最新的新頻道 UID
          if (data.userId !== uid) {
            updateDoc(doc(db, "drivers", uid), { userId: uid });
          }

          if (data.status === 'pending') {
            showSection('section-pending');
          } else if (data.status === 'approved') {
            showSection('section-main');
            renderMain(data, uid);
          } else if (data.status === 'rejected') {
             errEl.classList.remove('hide');
             errEl.innerHTML = `<div class="error-box">您的申請已被拒絕，請聯繫管理員。</div>`;
          }
        }
      }, (error) => {
        errEl.classList.remove('hide');
        errEl.innerHTML = `<div class="error-box">Firestore 連線失敗: ${error.message}</div>`;
      });

    } catch (err) {
      loader.classList.add('hide');
      errEl.classList.remove('hide');
      errEl.innerHTML = `<div class="error-box"><b>系統啟動失敗</b><br>${err.message}</div>`;
    }
  }

  function showSection(id) {
    ['section-register', 'section-pending', 'section-main'].forEach(s => {
      document.getElementById(s).classList.add('hide');
    });
    document.getElementById(id).classList.remove('hide');
  }

  function setupRegister(uid) {
    const btn = document.getElementById('reg-submit');
    btn.onclick = async () => {
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      if (!name || !phone) return alert("姓名與電話為必填");

      btn.disabled = true;
      btn.innerText = "正在上傳資料...";

      try {
        // 圖片上傳邏輯
        const upload = async (id, path) => {
          const file = document.getElementById(id).files[0];
          if (!file) return "";
          const sRef = ref(storage, `drivers/${uid}/${path}`);
          await uploadBytes(sRef, file);
          return await getDownloadURL(sRef);
        };

        const licenseUrl = await upload('file-license', 'license');
        const registrationUrl = await upload('file-registration', 'registration');
        const insuranceUrl = await upload('file-insurance', 'insurance');

        await setDoc(doc(db, "drivers", uid), {
          userId: uid, 
          name, 
          phone, 
          plate: document.getElementById('reg-plate').value,
          model: document.getElementById('reg-model').value,
          color: document.getElementById('reg-color').value,
          licenseImg: licenseUrl,
          registrationImg: registrationUrl, 
          insuranceImg: insuranceUrl,      
          status: 'pending',
          createdAt: serverTimestamp()
        });
        
      } catch (e) {
        alert("註冊失敗: " + e.message);
        btn.disabled = false;
        btn.innerText = "送出加盟申請";
      }
    };
  }

  function renderMain(data, uid) {
    document.getElementById('disp-name').innerText = data.name;
    document.getElementById('disp-car').innerText = `${data.plate} (${data.model})`;
    
    // 查詢指派給該司機的訂單
    const q = query(collection(db, "orders"), where("driverId", "==", uid));
    
    onSnapshot(q, (snap) => {
      const list = document.getElementById('orders-list');
      list.innerHTML = snap.empty ? '<div class="card">目前沒有指派給您的行程</div>' : '';
      snap.forEach(d => {
        const ord = d.data();
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div style="margin-bottom:10px;"><b>${ord.tripType}</b> | ${ord.appointmentTime}</div>
          <div style="font-size:13px; color:#666;">客：${ord.contactName}<br>起：${ord.pickup || ord.pickupLocation}</div>
          <div class="status-grid">
            <button class="btn-status ${ord.driverStatus==='onWay'?'active':''}" onclick="updateS('${d.id}','onWay')">前往中</button>
            <button class="btn-status ${ord.driverStatus==='completed'?'active':''}" onclick="updateS('${d.id}','completed')">結束</button>
          </div>
        `;
        list.appendChild(div);
      });
    });
  }

  window.updateS = (id, s) => updateDoc(doc(db, "orders", id), { driverStatus: s });

  start();
</script>
</body>
</html>
