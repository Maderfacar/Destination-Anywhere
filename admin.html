<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 管理調度 | 全功能中樞</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  
  <style>
    /* 2. 僅保留此頁面專用的功能性樣式 */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #CCC; margin-bottom: 10px; }
    
    /* 頁籤系統 */
    .tabs { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #D2D2D7; font-weight: 600; cursor: pointer; transition: 0.3s; white-space: nowrap; }
    .tab-btn.active { background: var(--apple-blue); color: white; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* 訂單特有狀態與內容 */
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }
    .badge-pending { background: #FFF4E5; color: #FF9500; }
    .badge-done { background: #E5F9E5; color: var(--apple-green); }

    .info-summary { background: #F8F8F8; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; border: 1px solid #EEE; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }

    /* 地址路線視覺 */
    .address-box { background: #F9F9FB; border-radius: 12px; padding: 12px; margin: 10px 0; border-left: 3px solid #DDD; }
    .address-box.pickup { border-left-color: var(--apple-green); }
    .address-box.dropoff { border-left-color: var(--apple-red); }

    .dispatch-zone { background: #F2F7FF; border-radius: 14px; padding: 15px; margin-top: 15px; border: 1px solid rgba(0,113,227,0.1); }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    
    .driver-tag { display: inline-block; padding: 5px 10px; background: #EEE; border-radius: 20px; font-size: 12px; margin: 3px; cursor: pointer; }
    
    /* 權限阻斷畫面 */
    #access-denied { display: none; padding: 50px; text-align: center; }

    /* 證件審核彈窗專用 */
    #detail-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
    }
    .modal-content {
      background: white; width: 100%; max-width: 450px; border-radius: 24px; 
      max-height: 85vh; overflow-y: auto; padding: 25px; position: relative;
    }
    .modal-doc-img { width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid #DDD; cursor: zoom-in; }
    .doc-label { font-size: 12px; font-weight: bold; color: var(--text-sub); margin-top: 12px; display: block; }
  </style>
</head>

<body>

<div id="admin-content" style="display:none;">
  <div class="header">
    <div style="font-weight:bold; font-size:20px;">DA 管理中樞</div>
    <button onclick="location.href='index.html'" style="background:none; border:1px solid #666; padding:6px 14px; border-radius:20px; font-size:12px;">返回首頁</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dispatch', this)">🚕 調度派車</button>
    <button class="tab-btn" onclick="switchTab('verify', this)">🆔 司機審核</button>
    <button class="tab-btn" onclick="switchTab('design', this)">🎨 裝修首頁</button>
  </div>

  <div id="panel-dispatch" class="panel active">
      <div class="section-title">📇 已核准司機庫</div>
      <div class="card">
        <div id="driver-tags-area"></div>
      </div>
      <div class="section-title">🚗 訂單詳細調度</div>
      <div id="orders-container"><div id="loading">讀取中...</div></div>
  </div>

  <div id="panel-verify" class="panel">
      <div class="section-title">⌛ 待審核申請</div>
      <div id="pending-drivers-list">
          <div style="text-align:center; padding:50px; color:#999;">暫無新申請</div>
      </div>
  </div>

  <div id="panel-design" class="panel">
      <div class="section-title">🖼️ 首頁視覺設定</div>
      <div class="card">
        <div style="margin-bottom: 15px;">
          <label class="input-label">首頁副標題 (Hero Sub)</label>
          <input type="text" id="edit-hero-sub">
        </div>
        <div style="margin-bottom: 15px;">
          <label class="input-label">預約卡片標題</label>
          <input type="text" id="edit-booking-title">
          <label class="input-label" style="margin-top:8px;">預約背景圖網址</label>
          <input type="text" id="edit-booking-bg">
        </div>
        <div style="margin-bottom: 15px;">
          <label class="input-label">行程規劃背景圖網址</label>
          <input type="text" id="edit-itinerary-bg">
        </div>
        <button class="btn btn-blue" onclick="saveDesignSettings()">💾 儲存設定並同步首頁</button>
      </div>
  </div>
</div>

</script>
</body>
</html>
