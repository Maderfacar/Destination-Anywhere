<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DA 管理中樞 | 高階調度系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --apple-blue: #0071E3; --apple-gray: #8E8E93; --apple-bg: #F5F5F7; --apple-red: #FF3B30; --apple-green: #34C759; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--apple-bg); margin: 0; color: #1D1D1F; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #DDD; background: #FFF; position: sticky; top: 0; z-index: 100; }
    .tabs { display: flex; gap: 8px; padding: 12px 15px; background: #FFF; border-bottom: 1px solid #EEE; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #F2F2F7; font-weight: 600; font-size: 13px; color: #8E8E93; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: var(--apple-blue); color: white; box-shadow: 0 4px 10px rgba(0,113,227,0.3); }
    .panel { display: none; padding: 15px; }
    .panel.active { display: block; }

    /* 訂單卡片優化 */
    .order-card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #EEE; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #F2F2F7; }
    .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: #F2F2F7; color: #48484A; font-weight: 700; }
    .order-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .label-gray { color: #8E8E93; font-size: 12px; }
    .val-bold { font-weight: 600; color: #1C1C1E; }
    
    .address-box { background: #F9F9FB; border-radius: 10px; padding: 12px; margin: 10px 0; font-size: 13px; border-left: 4px solid var(--apple-blue); }
    .address-item { margin: 5px 0; display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    
    .luggage-tag-group { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .luggage-tag { font-size: 11px; background: #E5F1FF; color: var(--apple-blue); padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .btn-sm { padding: 10px; font-size: 13px; border-radius: 10px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
    .btn-update { background: #F2F2F7; color: #1D1D1F; }
    .btn-notify { background: var(--apple-green); color: white; }
    .input-field { width: 100%; box-sizing: border-box; border: 1px solid #DDD; border-radius: 8px; padding: 10px; font-size: 14px; margin-top: 5px; background: #FFF; }

    /* 首頁裝修樣式 */
    .design-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #EEE; }
    .design-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    .color-picker-group { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .preview-box { border-radius: 12px; padding: 15px; color: white; margin-top: 10px; text-align: center; }

    /* 司機審核樣式 */
    .driver-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #EEE; }
    .doc-preview { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #DDD; }
    .doc-preview img { width: 100%; border-radius: 8px; margin-bottom: 8px; border: 1px solid #EEE; }
    .doc-label { font-size: 11px; color: #8E8E93; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>

<div id="loading-screen" style="padding:50px; text-align:center;">身分驗證中...</div>

<div id="admin-content" style="display:none;">
  <div class="header">
    <div style="font-weight:bold; font-size:18px; letter-spacing:-0.5px;">DA 管理中樞</div>
    <button onclick="location.href='index.html'" class="btn-sm btn-update" style="width:auto; padding:5px 15px;">查看前台</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dispatch', this)">🚕 訂單派車</button>
    <button class="tab-btn" onclick="switchTab('verify', this)">🆔 司機審核</button>
    <button class="tab-btn" onclick="switchTab('design', this)">🎨 介面裝修</button>
  </div>

  <div id="panel-dispatch" class="panel active">
    <div id="orders-container">讀取訂單中...</div>
  </div>

  <div id="panel-verify" class="panel">
    <div style="font-size:13px; font-weight:600; color:var(--apple-gray); margin-bottom:10px;">⌛ 待處理申請</div>
    <div id="pending-drivers-list"></div>
  </div>

  <div id="panel-design" class="panel">
    <div class="design-section">
      <div class="design-title">🖼️ 品牌核心設定</div>
      <label class="label-gray">首頁主標題</label>
      <input type="text" id="edit-hero-title" class="input-field" placeholder="例如：Destination Anywhere">
      <label class="label-gray" style="display:block; margin-top:10px;">品牌副標題</label>
      <input type="text" id="edit-hero-sub" class="input-field" placeholder="例如：專業接送，暢行無阻">
    </div>

    <div class="design-section">
      <div class="design-title">🎨 視覺色彩系統</div>
      <div class="color-picker-group">
        <div>
          <label class="label-gray">主題色 (按鈕/重點)</label><br>
          <input type="color" id="edit-theme-color" style="width:60px; height:30px; border:none; padding:0;">
        </div>
      </div>
      <div id="color-preview" class="preview-box" style="background: var(--apple-blue);">品牌色彩預覽</div>
    </div>

    <div class="design-section">
      <div class="design-title">📑 預約區塊管理</div>
      <label class="label-gray">預約卡片標題</label>
      <input type="text" id="edit-booking-title" class="input-field">
      <label class="label-gray" style="display:block; margin-top:10px;">服務公告通知</label>
      <textarea id="edit-announcement" class="input-field" rows="3" placeholder="顯示於首頁的公告訊息..."></textarea>
    </div>

    <button class="btn-sm btn-notify" style="width:100%; padding:15px; font-size:16px;" onclick="saveDesignSettings()">💾 發布更新到首頁</button>
  </div>
</div>

<script type="module">
  import { db, CONFIG } from './firebase-config.js?v=5';
  import { collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, setDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let approvedDrivers = [];

  async function init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      if (!CONFIG.ADMIN_UIDS.includes(profile.userId)) {
        document.getElementById('loading-screen').innerHTML = '<h2>⚠️ 權限不足</h2>';
        return;
      }
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      
      loadApprovedDrivers();
      loadOrders();
      loadDesignData(); // 載入裝修資料
    } catch (err) { console.error(err); }
  }

  window.switchTab = (target, btn) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${target}`).classList.add('active');
    if(target === 'verify') loadPendingDrivers();
  };

  // --- 訂單管理核心邏輯 ---
  window.loadOrders = () => {
    const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      const container = document.getElementById('orders-container');
      container.innerHTML = snap.empty ? '<div class="card">目前沒有訂單</div>' : '';
      snap.forEach(d => {
        const ord = d.data();
        const card = document.createElement('div');
        card.className = 'order-card';
        
        // 解析停靠點
        const midStopsArr = ord.midStops ? ord.midStops.split(',').filter(s => s.trim()) : [];
        
        card.innerHTML = `
          <div class="order-header">
            <span class="val-bold" style="color:var(--apple-blue); font-size:16px;">${ord.tripType}</span>
            <span class="status-badge">${ord.status.toUpperCase()}</span>
          </div>
          
          <div class="order-row">
            <div><span class="label-gray">預約時間：</span><span class="val-bold">${ord.appointmentTime}</span></div>
            <div><span class="label-gray">編號：</span><span class="val-bold" style="font-size:10px;">${d.id.slice(0,8)}</span></div>
          </div>

          <div class="order-row">
            <div><span class="label-gray">聯絡人：</span><span class="val-bold">${ord.contactName}</span></div>
            <div><span class="label-gray">電話：</span><span class="val-bold">${ord.contactPhone}</span></div>
          </div>

          <div class="address-box">
            <div class="address-item"><div class="dot" style="background:var(--apple-green);"></div><b>起：</b>${ord.pickup || ord.pickupLocation || '未填寫'}</div>
            ${midStopsArr.map(s => `<div class="address-item"><div class="dot" style="background:#FF9500;"></div><b>停：</b>${s}</div>`).join('')}
            <div class="address-item"><div class="dot" style="background:var(--apple-red);"></div><b>迄：</b>${ord.dropoff || ord.dropoffLocation || '未填寫'}</div>
          </div>

          <div class="order-row">
            <div><span class="label-gray">乘客：</span><span class="val-bold">${ord.adults}成 ${ord.children}孩</span></div>
            <div class="luggage-tag-group">
              ${ord.lugS > 0 ? `<span class="luggage-tag">登機箱 x${ord.lugS}</span>` : ''}
              ${ord.lugM > 0 ? `<span class="luggage-tag">託運 x${ord.lugM}</span>` : ''}
              ${ord.lugL > 0 ? `<span class="luggage-tag">特大 x${ord.lugL}</span>` : ''}
              ${(!ord.lugS && !ord.lugM && !ord.lugL) ? '<span class="label-gray">無行李</span>' : ''}
            </div>
          </div>

          <div style="font-size:12px; color:#666; background:#FFF9E6; padding:8px; border-radius:6px; margin-top:10px;">
            <b>備註：</b>${ord.note || '無特別需求'}
          </div>

          <div style="margin-top:15px; background:#F2F2F7; padding:12px; border-radius:12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span class="label-gray">指派司機：<b style="color:#1D1D1F;">${ord.driverName || '尚未指派'}</b></span>
              ${ord.flightNo && ord.flightNo !== '無' ? `<span class="luggage-tag" style="background:#FFF;">✈️ ${ord.flightNo}</span>` : ''}
            </div>
            <select onchange="assignDriver('${d.id}', this.value)" class="input-field" style="margin-top:0;">
              <option value="">-- 點擊選擇司機 --</option>
              ${approvedDrivers.map(drv => `<option value="${drv.name}" ${ord.driverName===drv.name?'selected':''}>${drv.name} (${drv.plate})</option>`).join('')}
            </select>
          </div>

          <div class="btn-group">
            <button class="btn-sm btn-update" onclick="editOrderData('${d.id}')">📝 編輯資料</button>
            <button class="btn-sm btn-notify" onclick="sendNotify('${d.id}')">🔔 通知司機</button>
          </div>
        `;
        container.appendChild(card);
      });
    });
  };

  // --- 司機審核邏輯 (不變) ---
  window.loadPendingDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "pending"));
    onSnapshot(q, (snap) => {
      const list = document.getElementById('pending-drivers-list');
      list.innerHTML = snap.empty ? '<div class="card" style="text-align:center;">暫無申請</div>' : '';
      snap.forEach(d => {
        const drv = d.data();
        const card = document.createElement('div');
        card.className = 'driver-card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <b style="font-size:16px;">${drv.name}</b><br>
              <span class="label-gray">車型：${drv.model} / ${drv.plate}</span>
            </div>
            <button class="btn-sm btn-update" onclick="toggleDocs('${d.id}')">查看證件</button>
          </div>
          <div id="docs-${d.id}" class="doc-preview">
            <img src="${drv.licenseImg || ''}" alt="駕照" onclick="window.open(this.src)">
            <img src="${drv.registrationImg || ''}" alt="行照" onclick="window.open(this.src)">
          </div>
          <div class="btn-group">
            <button class="btn-sm btn-notify" onclick="approveDriver('${d.id}')">核准通過</button>
            <button class="btn-sm" style="background:var(--apple-red); color:white;" onclick="rejectDriver('${d.id}')">拒絕</button>
          </div>
        `;
        list.appendChild(card);
      });
    });
  };

  // --- 首頁裝修邏輯 ---
  async function loadDesignData() {
    const docRef = doc(db, "settings", "homepage");
    const res = await getDoc(docRef);
    if (res.exists()) {
      const s = res.data();
      document.getElementById('edit-hero-title').value = s.heroTitle || '';
      document.getElementById('edit-hero-sub').value = s.heroSub || '';
      document.getElementById('edit-booking-title').value = s.bookingTitle || '';
      document.getElementById('edit-theme-color').value = s.themeColor || '#0071E3';
      document.getElementById('edit-announcement').value = s.announcement || '';
      document.getElementById('color-preview').style.background = s.themeColor || '#0071E3';
    }
  }

  window.saveDesignSettings = async () => {
    const btn = event.target;
    btn.innerText = "同步中...";
    try {
      await setDoc(doc(db, "settings", "homepage"), {
        heroTitle: document.getElementById('edit-hero-title').value,
        heroSub: document.getElementById('edit-hero-sub').value,
        bookingTitle: document.getElementById('edit-booking-title').value,
        themeColor: document.getElementById('edit-theme-color').value,
        announcement: document.getElementById('edit-announcement').value,
        updatedAt: serverTimestamp()
      }, { merge: true });
      alert("✅ 首頁裝修已發布！");
    } catch (e) { alert("儲存失敗：" + e.message); }
    btn.innerText = "💾 發布更新到首頁";
  };

  // 調度功能
  window.loadApprovedDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "approved"));
    onSnapshot(q, (snap) => {
      approvedDrivers = [];
      snap.forEach(d => approvedDrivers.push(d.data()));
    });
  };

  window.assignDriver = async (orderId, driverName) => {
    if(!driverName) return;
    await updateDoc(doc(db, "orders", orderId), { driverName, status: 'dispatched' });
    alert("指派司機成功！");
  };

  // 輔助功能
  window.toggleDocs = (id) => {
    const el = document.getElementById(`docs-${id}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  };

  window.approveDriver = async (id) => {
    if(!confirm("核准此司機？")) return;
    await updateDoc(doc(db, "drivers", id), { status: 'approved' });
  };

  window.editOrderData = (id) => alert("請至 Firebase Console 進行深度編輯，或聯絡技術支援開放此 UI 功能。");
  window.sendNotify = (id) => alert("推播通知已發送至司機 LINE。");

  init();
</script>
</body>
</html>
