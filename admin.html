<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員面板 - Destination Anywhere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-map-marked-alt me-2"></i>Destination Anywhere
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">首頁</a>
                <a class="nav-link" href="booking.html">預訂行程</a>
                <a class="nav-link active" href="#">管理員</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">
            <i class="fas fa-cogs me-2"></i>管理員面板
        </h1>

        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active" data-section="dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>儀表板
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="bookings">
                        <i class="fas fa-calendar-check me-2"></i>預訂管理
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="drivers">
                        <i class="fas fa-id-card me-2"></i>司機管理
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="vehicles">
                        <i class="fas fa-car me-2"></i>車輛管理
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="dashboard" class="admin-section">
                    <h2>儀表板</h2>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title">今日預訂</h5>
                                    <h2 class="text-primary">12</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title">活躍司機</h5>
                                    <h2 class="text-success">8</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title">總收入</h5>
                                    <h2 class="text-info">$15,680</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="bookings" class="admin-section" style="display: none;">
                    <h2>預訂管理</h2>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>預訂ID</th>
                                    <th>客戶</th>
                                    <th>目的地</th>
                                    <th>日期</th>
                                    <th>狀態</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#001</td>
                                    <td>張三</td>
                                    <td>台北車站</td>
                                    <td>2024-04-24</td>
                                    <td><span class="badge bg-success">已確認</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-primary">編輯</button>
                                        <button class="btn btn-sm btn-danger">取消</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="drivers" class="admin-section" style="display: none;">
                    <h2>司機管理</h2>
                    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#driverModal">
                        <i class="fas fa-plus me-2"></i>新增司機
                    </button>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>電話</th>
                                    <th>車牌號碼</th>
                                    <th>狀態</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>李司機</td>
                                    <td>0912-345-678</td>
                                    <td>ABC-1234</td>
                                    <td><span class="badge bg-success">在線</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-primary">編輯</button>
                                        <button class="btn btn-sm btn-danger">刪除</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="vehicles" class="admin-section" style="display: none;">
                    <h2>車輛管理</h2>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">豐田 Camry</h5>
                                    <p class="card-text">車牌: ABC-1234</p>
                                    <p class="card-text">狀態: <span class="badge bg-success">可用</span></p>
                                    <button class="btn btn-sm btn-primary">管理</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // 管理員面板功能
        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelectorAll('.list-group-item');
            const sections = document.querySelectorAll('.admin-section');

            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    navLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    
                    const targetSection = this.getAttribute('data-section');
                    sections.forEach(section => {
                        section.style.display = section.id === targetSection ? 'block' : 'none';
                    });
                });
            });
        });
    </script>
</body>
</html>
