<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 管理後台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --apple-bg: #F5F5F7; --apple-blue: #007AFF; --apple-green: #34C759;
      --apple-text: #1D1D1F; --apple-sub: #86868B;
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    .section-title { font-weight: 700; margin: 20px 0 10px; font-size: 18px; border-left: 4px solid var(--apple-blue); padding-left: 10px; }
    
    .driver-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0F0F0; }
    .btn { padding: 8px 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn-blue { background: var(--apple-blue); color: white; }
    .btn-outline { background: #E5E5EA; color: var(--apple-text); }

    /* 詳細資料彈窗 */
    #detail-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
    }
    .modal-content {
      background: white; width: 100%; max-width: 500px; border-radius: 24px; 
      max-height: 90vh; overflow-y: auto; padding: 25px; position: relative;
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
    .detail-item label { font-size: 11px; color: var(--apple-sub); display: block; }
    .detail-item p { margin: 2px 0; font-weight: 500; }
    .doc-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #DDD; cursor: zoom-in; }

    .hide { display: none !important; }
  </style>
</head>
<body>

<div id="loading" style="text-align:center; padding-top:100px;">🚀 安全載入中...</div>

<div id="admin-view" class="hide">
  <div class="header">
    <h1>DA 管理系統</h1>
    <button class="btn btn-outline" onclick="location.href='index.html'">回首頁</button>
  </div>

  <div class="section-title">📝 待審核司機</div>
  <div class="card" id="pending-list">
    </div>

  <div class="section-title">📊 系統功能</div>
  <div class="card">
    <button class="btn btn-outline" onclick="alert('功能開發中')">訂單總覽</button>
    <button class="btn btn-outline" onclick="alert('功能開發中')">系統配置</button>
  </div>
</div>

<div id="detail-modal" onclick="if(event.target==this) closeDetails()">
  <div class="modal-content">
    <h2 style="margin-top:0;">司機證件審核</h2>
    <div id="modal-body"></div>
    <div style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button class="btn btn-outline" onclick="closeDetails()">關閉</button>
      <button id="modal-approve-btn" class="btn btn-blue" style="background:var(--apple-green);">核准加盟</button>
    </div>
  </div>
</div>

<script type="module">
  import { CONFIG } from './config.js?v=7';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let db;

  async function init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const p = await liff.getProfile();
      if (!CONFIG.ADMIN_UIDS.includes(p.userId)) {
        alert("權限不足"); location.replace('index.html'); return;
      }

      const app = initializeApp(CONFIG.firebaseConfig);
      db = getFirestore(app);
      document.getElementById('loading').classList.add('hide');
      document.getElementById('admin-view').classList.remove('hide');

      loadPendingDrivers();
    } catch (e) { console.error(e); }
  }

  function loadPendingDrivers() {
    const q = query(collection(db, "drivers"), where("status", "==", "pending"));
    onSnapshot(q, (snap) => {
      const list = document.getElementById('pending-list');
      list.innerHTML = snap.empty ? '<p style="color:#999; font-size:14px;">暫無申請</p>' : '';
      
      snap.forEach(d => {
        const data = d.data();
        const div = document.createElement('div');
        div.className = 'driver-item';
        div.innerHTML = `
          <div>
            <div style="font-weight:600;">${data.name}</div>
            <div style="font-size:12px; color:#86868B;">${data.plate}</div>
          </div>
          <button class="btn btn-blue" id="btn-view-${data.uid}">查看並審核</button>
        `;
        list.appendChild(div);
        
        // 綁定點擊事件
        document.getElementById(`btn-view-${data.uid}`).onclick = () => viewDetails(data);
      });
    });
  }

  window.viewDetails = (data) => {
    const body = document.getElementById('modal-body');
    body.innerHTML = `
      <div class="detail-grid">
        <div class="detail-item"><label>姓名</label><p>${data.name}</p></div>
        <div class="detail-item"><label>電話</label><p>${data.phone}</p></div>
        <div class="detail-item"><label>車牌</label><p>${data.plate}</p></div>
        <div class="detail-item"><label>車型</label><p>${data.model} (${data.color})</p></div>
      </div>
      <div style="margin-top:15px;">
        <label style="font-size:12px; font-weight:bold;">🪪 駕照 / 📄 行照 / 🛡️ 保險</label>
        <img src="${data.docs?.license}" class="doc-img" onclick="window.open(this.src)">
        <img src="${data.docs?.registration}" class="doc-img" onclick="window.open(this.src)">
        <img src="${data.docs?.insurance}" class="doc-img" onclick="window.open(this.src)">
      </div>
    `;
    
    document.getElementById('modal-approve-btn').onclick = () => approveDriver(data.uid);
    document.getElementById('detail-modal').style.display = 'flex';
  };

  window.closeDetails = () => {
    document.getElementById('detail-modal').style.display = 'none';
  };

  window.approveDriver = async (uid) => {
    if (!confirm("核准此司機加盟？")) return;
    try {
      await updateDoc(doc(db, "drivers", uid), { status: 'approved', approvedAt: serverTimestamp() });
      alert("核准成功");
      closeDetails();
    } catch (e) { alert("失敗: " + e.message); }
  };

  init();
</script>
</body>
</html>
