<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 管理中樞 | 高階調度系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #CCC; background: #FFF; position: sticky; top: 0; z-index: 100; }
    .tabs { display: flex; gap: 8px; padding: 10px 15px; background: #F2F2F7; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #E5E5EA; font-weight: 700; font-size: 15px; color: #3A3A3C; }
    .tab-btn.active { background: #007AFF; color: white; }
    .panel { display: none; padding: 15px; }
    .panel.active { display: block; }

    /* 統一卡片樣式 - 強化版本 */
    .order-card, .driver-verify-card { 
      background: white; border-radius: 16px; padding: 22px; margin-bottom: 18px; 
      box-shadow: 0 6px 16px rgba(0,0,0,0.1); border: 1px solid #EEE; 
    }
    .order-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 17px; }
    .label-gray { color: #8E8E93; font-size: 15px; }
    .val-bold { font-weight: 700; color: #1C1C1E; font-size: 18px; }
    .address-line { font-size: 16px; padding: 12px 0; border-top: 1px solid #F2F2F7; margin-top: 10px; line-height: 1.5; color: #1C1C1E; }
    
    /* 司機證件預覽圖 */
    .img-preview-group { display: flex; gap: 10px; margin-top: 15px; }
    .img-box { flex: 1; aspect-ratio: 4/3; background: #F2F2F7; border-radius: 8px; overflow: hidden; border: 1px solid #DDD; cursor: pointer; position: relative; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .img-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; font-size: 11px; text-align: center; padding: 2px 0; }

    /* 按鈕群組 */
    .btn-group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .btn-sm { padding: 15px; font-size: 16px; border-radius: 12px; cursor: pointer; border: none; font-weight: 700; transition: 0.2s; }
    .btn-update { background: #F2F2F7; color: #1D1D1F; border: 1px solid #DDD; }
    .btn-customer { background: #E5F9E5; color: #28A745; }
    .btn-driver { background: #E5F1FF; color: #007AFF; }
    .btn-reject { background: #FFF2F2; color: #FF3B30; }

    /* 編輯視窗 (Modal) */
    #edit-modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.6); z-index: 2000; overflow-y: auto; padding: 20px 0;
    }
    .modal-content { 
      background: white; width: 92%; max-width: 500px; margin: auto; border-radius: 20px; padding: 25px; box-sizing: border-box; 
    }
    .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #1C1C1E; border-bottom: 2px solid #EEE; padding-bottom: 10px; }
    .input-field { width: 100%; box-sizing: border-box; border: 1px solid #CCC; border-radius: 10px; padding: 14px; font-size: 16px; margin-top: 5px; background: #FFF; }
    .section-title { font-size: 20px; font-weight: 800; margin: 15px 0; color: #1C1C1E; }
  </style>
</head>
<body>

<div id="loading-screen" style="padding:100px 20px; text-align:center; font-family:sans-serif;">
  <div style="font-size:40px; margin-bottom:20px;">🔒</div>
  <div style="font-weight:bold; color:#8E8E93;">身分驗證中...</div>
</div>

<div id="edit-modal">
  <div class="modal-content">
    <div class="modal-title">📝 修改訂單內容</div>
    <input type="hidden" id="edit-order-id">
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
      <div><label class="label-gray">聯絡人姓名</label><input type="text" id="edit-order-name" class="input-field"></div>
      <div><label class="label-gray">聯絡電話</label><input type="text" id="edit-order-phone" class="input-field"></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
      <div><label class="label-gray">預約時間</label><input type="text" id="edit-order-time" class="input-field"></div>
      <div><label class="label-gray">航班編號</label><input type="text" id="edit-order-flight" class="input-field"></div>
    </div>

    <label class="label-gray" style="margin-top:15px; display:block;">起點</label>
    <input type="text" id="edit-order-pickup" class="input-field">
    
    <label class="label-gray" style="margin-top:15px; display:block;">中途停靠 (逗號隔開)</label>
    <input type="text" id="edit-order-mid" class="input-field">

    <label class="label-gray" style="margin-top:15px; display:block;">終點</label>
    <input type="text" id="edit-order-dropoff" class="input-field">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
      <div><label class="label-gray">大人人數</label><input type="number" id="edit-order-adults" class="input-field"></div>
      <div><label class="label-gray">孩童人數</label><input type="number" id="edit-order-children" class="input-field"></div>
    </div>

    <div class="btn-group-grid" style="margin-top:25px;">
      <button class="btn-sm btn-update" onclick="closeEditModal()">取消</button>
      <button class="btn-sm btn-driver" onclick="submitOrderUpdate()">確認修改</button>
    </div>
  </div>
</div>

<div id="admin-content" style="display:none;">
  <div class="header">
    <div style="font-weight:bold; font-size:20px;">DA 管理中樞</div>
    <button onclick="location.href='index.html'" class="btn-sm btn-update" style="width:auto; padding:8px 15px;">首頁</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dispatch', this)">🚕 調度派車</button>
    <button class="tab-btn" onclick="switchTab('verify', this)">🆔 司機審核</button>
    <button class="tab-btn" onclick="switchTab('design', this)">🎨 裝修</button>
  </div>

  <div id="panel-dispatch" class="panel active">
    <div id="orders-container">讀取中...</div>
  </div>

  <div id="panel-verify" class="panel">
    <div class="section-title">⌛ 待審核司機申請</div>
    <div id="pending-drivers-list"></div>
  </div>

  <div id="panel-design" class="panel">
    <div class="order-card">
      <h3 style="margin-top:0;">🖼️ 核心視覺設定</h3>
      <label class="label-gray">首頁主標題</label>
      <input type="text" id="edit-hero-title" class="input-field">
      <label class="label-gray" style="margin-top:15px; display:block;">首頁副標題</label>
      <input type="text" id="edit-hero-sub" class="input-field">
      <button class="btn-sm btn-driver" style="width:100%; margin-top:25px;" onclick="saveDesignSettings()">💾 儲存並同步全站</button>
    </div>
  </div>
</div>

<script type="module">
  import { db, CONFIG } from './firebase-config.js?v=1';
  import { collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, setDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let approvedDrivers = [];
  const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/te3nqlpvmiekxglqy9jt0xp2org17q5v";

  async function init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      if (!CONFIG.ADMIN_UIDS.includes(profile.userId)) {
        document.getElementById('loading-screen').innerHTML = '<h2>⚠️ 權限不足</h2>';
        return;
      }
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      loadApprovedDrivers();
      loadOrders();
      loadDesignData();
    } catch (err) { console.error(err); }
  }

  window.switchTab = (target, btn) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${target}`).classList.add('active');
    if(target === 'verify') loadPendingDrivers();
  };

  window.loadOrders = () => {
    const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      const container = document.getElementById('orders-container');
      container.innerHTML = snap.empty ? '<div class="order-card">目前沒有訂單</div>' : '';
      snap.forEach(d => {
        const ord = d.data();
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
          <div class="order-row"><span class="val-bold" style="color:#007AFF;">${ord.tripType}</span><span class="val-bold" style="background:#F2F2F7; padding:4px 8px; border-radius:6px; font-size:14px;">${ord.status}</span></div>
          <div class="order-row"><div><span class="label-gray">時間：</span><span class="val-bold">${ord.appointmentTime}</span></div></div>
          <div class="order-row"><div><span class="label-gray">客戶：</span><span class="val-bold" style="font-size:20px;">${ord.contactName}</span></div><div><span class="label-gray">電話：</span><span class="val-bold">${ord.contactPhone}</span></div></div>
          <div class="address-line"><b>起：</b>${ord.pickup || ord.pickupLocation || '--'}<br><b>終：</b>${ord.dropoff || ord.dropoffLocation || '--'}</div>
          <div style="margin-top:15px; background:#F9F9FB; padding:12px; border-radius:12px; border: 1px solid #EEE;">
            <label class="label-gray">執行司機：${ord.driverName || '未指派'}</label>
            <select onchange="assignDriver('${d.id}', this.value)" class="input-field">
              <option value="">-- 重新指派司機 --</option>
              ${approvedDrivers.map(drv => `<option value="${drv.name}" ${ord.driverName===drv.name?'selected':''}>${drv.name}</option>`).join('')}
            </select>
          </div>
          <div class="btn-group-grid">
            <button class="btn-sm btn-update" onclick='openEditModal("${d.id}", ${JSON.stringify(ord).replace(/'/g, "&apos;")})'>📝 修改內容</button>
            <button class="btn-sm btn-driver" onclick="sendNotify('${d.id}', 'driver')">🆔 通知司機</button>
          </div>
        `;
        container.appendChild(card);
      });
    });
  };

  window.loadPendingDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "pending"));
    onSnapshot(q, (snap) => {
      const list = document.getElementById('pending-drivers-list');
      list.innerHTML = snap.empty ? '<div class="order-card">目前沒有待審核申請</div>' : '';
      snap.forEach(d => {
        const drv = d.data();
        const card = document.createElement('div');
        card.className = 'driver-verify-card';
        card.innerHTML = `
          <div class="order-row"><span class="val-bold" style="font-size:22px;">${drv.name}</span><span class="val-bold" style="color:#007AFF;">${drv.phone}</span></div>
          <div class="order-row"><span>車型：${drv.model}</span><span>車號：<b>${drv.plate}</b></span></div>
          <div class="img-preview-group">
            <div class="img-box" onclick="window.open('${drv.licenseImg}')"><img src="${drv.licenseImg}"><div class="img-label">駕照正反面</div></div>
            <div class="img-box" onclick="window.open('${drv.registrationImg}')"><img src="${drv.registrationImg}"><div class="img-label">行照</div></div>
            <div class="img-box" onclick="window.open('${drv.insuranceImg}')"><img src="${drv.insuranceImg}"><div class="img-label">保險證明</div></div>
          </div>
          <div class="btn-group-grid">
            <button class="btn-sm btn-reject" onclick="verifyDriver('${d.id}', 'rejected')">❌ 拒絕申請</button>
            <button class="btn-sm btn-customer" onclick="verifyDriver('${d.id}', 'approved')">✅ 核准加盟</button>
          </div>
        `;
        list.appendChild(card);
      });
    });
  };

  window.verifyDriver = async (uid, newStatus) => {
    try {
      if(newStatus === 'rejected') {
        if(!confirm("確定要拒絕此司機申請嗎？")) return;
        await updateDoc(doc(db, "drivers", uid), { status: 'rejected' });
      } else {
        await updateDoc(doc(db, "drivers", uid), { status: 'approved' });
      }
      alert("✅ 已更新司機狀態");
    } catch (e) { alert("操作失敗"); }
  };

  window.openEditModal = (id, data) => {
    document.getElementById('edit-order-id').value = id;
    document.getElementById('edit-order-name').value = data.contactName || '';
    document.getElementById('edit-order-phone').value = data.contactPhone || '';
    document.getElementById('edit-order-time').value = data.appointmentTime || '';
    document.getElementById('edit-order-flight').value = data.flightNumber || '';
    document.getElementById('edit-order-pickup').value = data.pickup || data.pickupLocation || '';
    document.getElementById('edit-order-mid').value = data.midStops || '';
    document.getElementById('edit-order-dropoff').value = data.dropoff || data.dropoffLocation || '';
    document.getElementById('edit-order-adults').value = data.adults || 0;
    document.getElementById('edit-order-children').value = data.children || 0;
    document.getElementById('edit-modal').style.display = 'block';
  };

  window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';

  window.submitOrderUpdate = async () => {
    const id = document.getElementById('edit-order-id').value;
    const updateData = {
      contactName: document.getElementById('edit-order-name').value,
      contactPhone: document.getElementById('edit-order-phone').value,
      appointmentTime: document.getElementById('edit-order-time').value,
      flightNumber: document.getElementById('edit-order-flight').value,
      pickup: document.getElementById('edit-order-pickup').value,
      midStops: document.getElementById('edit-order-mid').value,
      dropoff: document.getElementById('edit-order-dropoff').value,
      adults: parseInt(document.getElementById('edit-order-adults').value) || 0,
      children: parseInt(document.getElementById('edit-order-children').value) || 0,
      updatedAt: serverTimestamp()
    };
    try {
      await updateDoc(doc(db, "orders", id), updateData);
      alert("✅ 訂單已更新");
      closeEditModal();
    } catch (e) { alert("更新失敗"); }
  };

  window.sendNotify = async (orderId, target) => {
    try {
      const snap = await getDoc(doc(db, "orders", orderId));
      if (!snap.exists()) { alert("找不到訂單"); return; }
      const ord = snap.data();
      const payload = {
        orderId: orderId,
        target: target,
        driverLineId: ord.driverId || "",      
        customerLineId: ord.customerId || "",  
        contactName: ord.contactName || "",
        contactPhone: ord.contactPhone || "",
        pickup: ord.pickup || ord.pickupLocation || "",
        dropoff: ord.dropoff || ord.dropoffLocation || "",
        appointmentTime: ord.appointmentTime || "",
        tripType: ord.tripType || "",
        timestamp: new Date().toISOString()
      };
      const response = await fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (response.ok) alert(`✅ 通知已成功發送`);
    } catch (e) { alert("❌ 發送失敗"); }
  };

  window.assignDriver = async (orderId, driverName) => {
    if(!driverName) return;
    try {
      const drv = approvedDrivers.find(d => d.name === driverName);
      await updateDoc(doc(db, "orders", orderId), { 
        driverName: driverName, 
        driverId: drv ? (drv.userId || "") : "", 
        status: 'dispatched',
        dispatchedAt: serverTimestamp()
      });
      alert("✅ 指派成功：" + driverName);
    } catch (e) { alert("❌ 指派失敗"); }
  };

  window.loadApprovedDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "approved"));
    onSnapshot(q, (snap) => {
      approvedDrivers = [];
      snap.forEach(d => approvedDrivers.push(d.data()));
    });
  };

  async function loadDesignData() {
    try {
      const res = await getDoc(doc(db, "settings", "homepage"));
      if (res.exists()) {
        const s = res.data();
        document.getElementById('edit-hero-title').value = s.heroTitle || '';
        document.getElementById('edit-hero-sub').value = s.heroSub || '';
      }
    } catch (e) { console.error(e); }
  }

  window.saveDesignSettings = async () => {
    try {
      await setDoc(doc(db, "settings", "homepage"), {
        heroTitle: document.getElementById('edit-hero-title').value,
        heroSub: document.getElementById('edit-hero-sub').value,
        updatedAt: serverTimestamp()
      }, { merge: true });
      alert("✅ 設定已同步");
    } catch (e) { alert("儲存失敗"); }
  };

  init();
</script>
</body>
</html>
