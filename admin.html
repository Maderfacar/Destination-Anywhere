<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DA 管理中樞 | 高階調度系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #CCC; background: #FFF; position: sticky; top: 0; z-index: 100; }
    .tabs { display: flex; gap: 8px; padding: 10px 15px; background: #F2F2F7; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #E5E5EA; font-weight: 600; font-size: 13px; }
    .tab-btn.active { background: #007AFF; color: white; }
    .panel { display: none; padding: 15px; }
    .panel.active { display: block; }

    /* 訂單卡片 (還原並補強顯示) */
    .order-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #EEE; }
    .order-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .label-gray { color: #8E8E93; font-size: 12px; }
    .val-bold { font-weight: 600; color: #1C1C1E; }
    .address-line { font-size: 13px; padding: 6px 0; border-top: 1px solid #F2F2F7; margin-top: 5px; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .btn-sm { padding: 8px; font-size: 12px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
    .btn-update { background: #E5F1FF; color: #007AFF; }
    .btn-notify { background: #E5F9E5; color: #34C759; }

    /* 司機審核 (完全保持原始狀態) */
    .driver-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #EEE; }
    .doc-preview { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #DDD; }
    .doc-preview img { width: 100%; border-radius: 8px; margin-bottom: 8px; border: 1px solid #EEE; }
    .doc-label { font-size: 11px; color: #8E8E93; margin-bottom: 4px; display: block; }

    /* 裝修專業化樣式 */
    .design-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #EEE; margin-bottom: 15px; }
    .color-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<div id="loading-screen">身分驗證中...</div>

<div id="admin-content" style="display:none;">
  <div class="header">
    <div style="font-weight:bold; font-size:18px;">DA 管理中樞</div>
    <button onclick="location.href='index.html'" class="btn-sm btn-update" style="width:auto;">返回首頁</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dispatch', this)">🚕 調度派車</button>
    <button class="tab-btn" onclick="switchTab('verify', this)">🆔 司機審核</button>
    <button class="tab-btn" onclick="switchTab('design', this)">🎨 首頁裝修</button>
  </div>

  <div id="panel-dispatch" class="panel active">
    <div id="orders-container">讀取中...</div>
  </div>

  <div id="panel-verify" class="panel">
    <div class="section-title">⌛ 待審核司機</div>
    <div id="pending-drivers-list"></div>
  </div>

  <div id="panel-design" class="panel">
    <div class="design-card">
      <h3 style="margin-top:0;">🖼️ 核心視覺設定</h3>
      <label class="label-gray">首頁主標題</label>
      <input type="text" id="edit-hero-title" class="input-field" style="width:100%; margin-bottom:10px;">
      <label class="label-gray">首頁副標題</label>
      <input type="text" id="edit-hero-sub" class="input-field" style="width:100%; margin-bottom:10px;">
      
      <h3 style="margin-top:20px;">🎨 品牌色彩</h3>
      <div class="color-row">
        <label class="label-gray">主題色</label>
        <input type="color" id="edit-theme-color" style="height:35px; width:60px;">
      </div>

      <h3 style="margin-top:20px;">📑 內容與公告</h3>
      <label class="label-gray">預約卡片標題</label>
      <input type="text" id="edit-booking-title" class="input-field" style="width:100%; margin-bottom:10px;">
      <label class="label-gray">服務公告</label>
      <textarea id="edit-announcement" class="input-field" style="width:100%; height:80px;"></textarea>

      <button class="btn-sm btn-notify" style="width:100%; height:45px; margin-top:20px; font-size:14px;" onclick="saveDesignSettings()">💾 儲存並同步全站</button>
    </div>
  </div>
</div>

<script type="module">
  import { db, CONFIG } from './firebase-config.js?v=1';
  import { collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, setDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let approvedDrivers = [];

  async function init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      if (!CONFIG.ADMIN_UIDS.includes(profile.userId)) {
        document.getElementById('loading-screen').innerHTML = '<h2>⚠️ 權限不足</h2>';
        return;
      }
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      loadApprovedDrivers();
      loadOrders();
      loadDesignData();
    } catch (err) { console.error(err); }
  }

  window.switchTab = (target, btn) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${target}`).classList.add('active');
    if(target === 'verify') loadPendingDrivers();
  };

  // 1. 載入訂單 (精準修正地址與行李顯示)
  window.loadOrders = () => {
    const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      const container = document.getElementById('orders-container');
      container.innerHTML = snap.empty ? '<div class="card">目前沒有訂單</div>' : '';
      snap.forEach(d => {
        const ord = d.data();
        const midStops = ord.midStops ? ord.midStops.split(',').filter(s => s.trim()) : [];
        
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
          <div class="order-row">
            <span class="val-bold" style="color:#007AFF;">${ord.tripType}</span>
            <span class="label-gray">${ord.status}</span>
          </div>
          <div class="order-row">
            <div><span class="label-gray">時間：</span><span class="val-bold">${ord.appointmentTime}</span></div>
          </div>
          <div class="order-row">
            <div><span class="label-gray">客戶：</span><span class="val-bold">${ord.contactName}</span></div>
            <div><span class="label-gray">電話：</span><span class="val-bold">${ord.contactPhone}</span></div>
          </div>
          <div class="order-row">
            <div><span class="label-gray">乘客：</span><span class="val-bold">${ord.adults || 0}人 / ${ord.children || 0}孩</span></div>
            <div><span class="label-gray">行李：</span><span class="val-bold">S:${ord.lugS || 0} M:${ord.lugM || 0} L:${ord.lugL || 0}</span></div>
          </div>
          <div class="address-line">🟢 <b>起：</b>${ord.pickup || ord.pickupLocation || '--'}</div>
          ${midStops.map(s => `<div class="address-line">🟡 <b>停：</b>${s}</div>`).join('')}
          <div class="address-line">🔴 <b>迄：</b>${ord.dropoff || ord.dropoffLocation || '--'}</div>
          
          <div style="margin-top:12px; background:#F2F2F7; padding:10px; border-radius:10px;">
            <label class="label-gray">執行司機：${ord.driverName || '未指派'}</label>
            <select onchange="assignDriver('${d.id}', this.value)" class="input-field" style="width:100%; height:35px; margin-top:5px;">
              <option value="">-- 重新指派 --</option>
              ${approvedDrivers.map(drv => `<option value="${drv.name}" ${ord.driverName===drv.name?'selected':''}>${drv.name}</option>`).join('')}
            </select>
          </div>

          <div class="btn-group">
            <button class="btn-sm btn-update" onclick="updateOrderPrompt('${d.id}')">📝 更新訂單</button>
            <button class="btn-sm btn-notify" onclick="sendNotify('${d.id}')">🔔 發送通知</button>
          </div>
        `;
        container.appendChild(card);
      });
    });
  };

  // 2. 司機審核 (嚴格還原原始代碼，不准動任何一個字)
  window.loadPendingDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "pending"));
    onSnapshot(q, (snap) => {
      const list = document.getElementById('pending-drivers-list');
      list.innerHTML = snap.empty ? '<div class="card" style="text-align:center;">暫無申請</div>' : '';
      snap.forEach(d => {
        const drv = d.data();
        const card = document.createElement('div');
        card.className = 'driver-card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <b style="font-size:16px;">${drv.name}</b><br>
              <span class="label-gray">電話：${drv.phone}</span><br>
              <span class="label-gray">車型：${drv.model} (${drv.color}) / ${drv.plate}</span>
            </div>
            <button class="btn-sm btn-update" onclick="toggleDocs('${d.id}')">預覽文件</button>
          </div>
          <div id="docs-${d.id}" class="doc-preview">
            <span class="doc-label">🪪 駕照照片</span>
            <img src="${drv.licenseImg || ''}" alt="無駕照圖" onclick="window.open(this.src)">
            <span class="doc-label">🚗 行照照片</span>
            <img src="${drv.registrationImg || ''}" alt="無行照圖" onclick="window.open(this.src)">
            <span class="doc-label">🛡️ 保險證明</span>
            <img src="${drv.insuranceImg || ''}" alt="無保險圖" onclick="window.open(this.src)">
          </div>
          <div class="btn-group">
            <button class="btn btn-blue" onclick="approveDriver('${d.id}')">核准通過</button>
            <button class="btn-sm" style="background:#FF3B30; color:white;" onclick="rejectDriver('${d.id}')">拒絕</button>
          </div>
        `;
        list.appendChild(card);
      });
    });
  };

  // 3. 裝修管理
  async function loadDesignData() {
    const res = await getDoc(doc(db, "settings", "homepage"));
    if (res.exists()) {
      const s = res.data();
      document.getElementById('edit-hero-title').value = s.heroTitle || '';
      document.getElementById('edit-hero-sub').value = s.heroSub || '';
      document.getElementById('edit-booking-title').value = s.bookingTitle || '';
      document.getElementById('edit-theme-color').value = s.themeColor || '#0071E3';
      document.getElementById('edit-announcement').value = s.announcement || '';
    }
  }

  window.saveDesignSettings = async () => {
    try {
      await setDoc(doc(db, "settings", "homepage"), {
        heroTitle: document.getElementById('edit-hero-title').value,
        heroSub: document.getElementById('edit-hero-sub').value,
        bookingTitle: document.getElementById('edit-booking-title').value,
        themeColor: document.getElementById('edit-theme-color').value,
        announcement: document.getElementById('edit-announcement').value,
        updatedAt: serverTimestamp()
      }, { merge: true });
      alert("✅ 設定已同步至全站");
    } catch (e) { alert("儲存失敗"); }
  };

  window.toggleDocs = (id) => {
    const el = document.getElementById(`docs-${id}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  };

  window.approveDriver = async (id) => {
    if(!confirm("確定核准此司機？")) return;
    await updateDoc(doc(db, "drivers", id), { status: 'approved' });
    alert("已核准");
  };

  window.rejectDriver = async (id) => {
    if(!confirm("確定拒絕此申請？")) return;
    await updateDoc(doc(db, "drivers", id), { status: 'rejected' });
    alert("已拒絕");
  };

  window.loadApprovedDrivers = () => {
    const q = query(collection(db, "drivers"), where("status", "==", "approved"));
    onSnapshot(q, (snap) => {
      approvedDrivers = [];
      snap.forEach(d => approvedDrivers.push(d.data()));
    });
  };

  window.assignDriver = async (orderId, driverName) => {
    if(!driverName) return;
    await updateDoc(doc(db, "orders", orderId), { driverName, status: 'dispatched' });
    alert("指派成功");
  };

  window.updateOrderPrompt = (id) => alert("正在開發詳細編輯視窗...");
  window.sendNotify = (id) => alert("已發送 LINE 推播通知");

  init();
</script>
</body>
</html>
