<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination Anywhere | 探索未知，隨心所行</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --apple-bg: #FFFFFF;
      --apple-secondary: #F5F5F7;
      --apple-blue: #007AFF;
      --apple-text: #1D1D1F;
      --apple-sub: #86868B;
      --card-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    body {
      background: var(--apple-bg);
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Hero Section */
    .hero {
      padding: 40px 20px 20px;
      text-align: left;
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .hero p {
      color: var(--apple-sub);
      font-size: 17px;
    }

    /* Bento Grid Layout */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 0 20px 30px;
    }

    .bento-item {
      background: var(--apple-secondary);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .bento-item:active { transform: scale(0.96); }

    .bento-main { grid-column: span 2; background: #1D1D1F; color: white; min-height: 120px; }
    .bento-blue { background: var(--apple-blue); color: white; }
    
    .item-title { font-weight: 600; font-size: 18px; display: block; }
    .item-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; display: block; }

    /* Discovery (Blog Style) */
    .section-header {
      padding: 0 20px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-header h2 { font-size: 22px; font-weight: 700; }
    
    .scroll-container {
      display: flex;
      overflow-x: auto;
      padding: 0 20px 40px;
      gap: 15px;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .spot-card {
      min-width: 260px;
      height: 340px;
      background: #EEE;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }
    .spot-overlay {
      position: absolute;
      bottom: 0; width: 100%;
      padding: 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
      box-sizing: border-box;
    }

    /* Booking Modal Overlay */
    #booking-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      padding-bottom: 50px;
    }
    #booking-overlay.active { transform: translateY(0); }
    .close-btn {
      position: sticky; top: 15px; left: 15px;
      background: rgba(0,0,0,0.05);
      border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 20px;
      z-index: 1001; cursor: pointer;
    }

    /* 這裡可以放入你原本的訂車 CSS... 為了節省篇幅先省略 */
  </style>
</head>
<body>

  <div id="home-view">
    <section class="hero">
      <h1>您好，<span id="user-name">旅伴</span></h1>
      <p>今天要前往哪裡探索？</p>
    </section>

    <div class="bento-grid">
      <div class="bento-item bento-main" onclick="openBooking()">
        <span class="item-title">快速預約接送</span>
        <span class="item-sub">即時呼叫專業司機，享受高品質旅程</span>
        <div style="margin-top:20px; font-size:24px;">🚕 →</div>
      </div>

      <div class="bento-item bento-blue" onclick="alert('Google API 行程規劃即將上線')">
        <span class="item-title">規劃行程</span>
        <span class="item-sub">智慧路徑優化</span>
      </div>

      <div class="bento-item">
        <span class="item-title">我的里程</span>
        <span id="mileage-val" class="item-sub">累積 0 KM</span>
      </div>
    </div>

    <div class="section-header">
      <h2>精選景點</h2>
      <span style="color:var(--apple-blue); font-size:14px;">查看全部</span>
    </div>

    <div class="scroll-container">
      <div class="spot-card" style="background-image: url('https://images.unsplash.com/photo-1571471811631-9b4c88bb47f3?q=80&w=500');">
        <div class="spot-overlay">
          <b style="font-size:18px;">九份山城</b>
          <p style="font-size:12px; opacity:0.8;">沈浸在宮崎駿般的奇幻氛圍</p>
        </div>
      </div>
      <div class="spot-card" style="background-image: url('https://images.unsplash.com/photo-1547900596-eb5260f95d4e?q=80&w=500');">
        <div class="spot-overlay">
          <b style="font-size:18px;">太魯閣峽谷</b>
          <p style="font-size:12px; opacity:0.8;">見證大自然的鬼斧神工</p>
        </div>
      </div>
    </div>
  </div>

  <div id="booking-overlay">
    <button class="close-btn" onclick="closeBooking()">✕</button>
    <div style="padding: 20px;">
        <h2 style="margin-top:0;">預約行程</h2>
        <iframe src="inner_booking.html" style="width:100%; height:85vh; border:none;"></iframe>
    </div>
  </div>

  <script type="module">
    import { CONFIG } from './config.js';

    // 初始化 LIFF
    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile();
        document.getElementById('user-name').innerText = p.displayName;
      } catch (e) { console.error(e); }
    }

    window.openBooking = () => {
      document.getElementById('booking-overlay').classList.add('active');
    };

    window.closeBooking = () => {
      document.getElementById('booking-overlay').classList.remove('active');
    };

    init();
  </script>
</body>
</html>
