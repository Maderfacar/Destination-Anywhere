<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination Anywhere | 訂車服務</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { 
      --bg-color: #F2F2F2; --card-bg: #FFFFFF; --text-main: #1D1D1F; 
      --text-sub: #666666; --apple-blue: #0071E3; --apple-red: #FF453A;
    }
    body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
    
    .user-section { text-align: center; padding: 15px 0; }
    #user-avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #FFF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 8px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #CCC; padding-bottom: 10px; margin-bottom: 20px; }
    .section-title { font-weight: bold; margin: 25px 0 12px 0; font-size: 16px; }
    .divider { border: 0; border-top: 1px solid #CCC; margin: 15px 0; }

    .station-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .station-input { border: none; background: transparent; font-size: 16px; border-bottom: 1px solid #BBB; padding: 5px; width: 70%; color: var(--text-main); }
    .station-input:focus { outline: none; border-bottom: 2px solid var(--apple-blue); }

    .counter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }
    .counter-ctrl { display: flex; align-items: center; gap: 12px; }
    .ctrl-btn { background: #FFF; border: 1px solid #AAA; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    
    input[type="date"], input[type="time"] { border: 1px solid #CCC; border-radius: 8px; padding: 10px; font-size: 15px; background: white; width: 48%; box-sizing: border-box; }

    .confirm-btn { 
      width: 100%; background: var(--apple-blue); color: white; border: none; 
      border-radius: 12px; padding: 18px; font-size: 18px; font-weight: bold; 
      margin-top: 30px; cursor: pointer;
    }
    #admin-entrance { display:none; position:fixed; bottom:30px; right:20px; z-index:99; }
    #admin-link { display:none; color:var(--apple-blue); text-decoration:none; font-size:13px; border:1px solid var(--apple-blue); padding:4px 12px; border-radius:20px; margin-top: 5px; }
  </style>
</head>

<body>

<div class="user-section">
  <img id="user-avatar" style="display: none;" />
  <div id="user-greeting" style="font-weight:600;">載入中...</div>
  <center><a href="admin.html" id="admin-link">管理入口</a></center>
</div>

<div class="header">
  <div style="font-weight:bold; letter-spacing:2px;">訂車服務</div>
  <div id="today-display" style="color: var(--text-sub); font-size: 14px;"></div>
</div>

<div class="section-title">【行程站點】</div>
<div id="station-container">
  <div class="station-item">
    <span>1. 上車：</span>
    <input type="text" class="station-input stop-point" placeholder="請輸入起點地址">
    <span>✏️</span>
  </div>
  <div class="station-item">
    <span>2. 下車：</span>
    <input type="text" class="station-input stop-point" placeholder="請輸入終點地址">
    <span>✏️</span>
  </div>
</div>
<div id="add-stop" style="color:var(--apple-blue); font-size:14px; cursor:pointer; font-weight: 500;" onclick="addNewStop()">[ + 新增停靠點 ]</div>

<hr class="divider">

<div class="section-title">時間</div>
<div style="display:flex; justify-content: space-between;">
  <input type="date" id="order-date">
  <input type="time" id="order-time">
</div>

<hr class="divider">

<div class="section-title">乘客</div>
<div class="counter-row"><span>成人</span><div class="counter-ctrl"><b id="adult-count">2</b><button class="ctrl-btn" onclick="qty('adult-count',1)">+</button><button class="ctrl-btn" onclick="qty('adult-count',-1)">-</button></div></div>
<div class="counter-row"><span>兒童</span><div class="counter-ctrl"><b id="child-count">0</b><button class="ctrl-btn" onclick="qty('child-count',1)">+</button><button class="ctrl-btn" onclick="qty('child-count',-1)">-</button></div></div>

<hr class="divider">

<div class="section-title">行李配置 ▼</div>
<div class="counter-row"><span>🧳 大型 (28吋以上)</span><div class="counter-ctrl"><b id="l-large">2</b><button class="ctrl-btn" onclick="qty('l-large',1)">+</button><button class="ctrl-btn" onclick="qty('l-large',-1)">-</button></div></div>
<div class="counter-row"><span>🧳 中型 (24-28吋)</span><div class="counter-ctrl"><b id="l-mid">1</b><button class="ctrl-btn" onclick="qty('l-mid',1)">+</button><button class="ctrl-btn" onclick="qty('l-mid',-1)">-</button></div></div>
<div class="counter-row"><span>🧳 小型 (登機箱/手提)</span><div class="counter-ctrl"><b id="l-small">0</b><button class="ctrl-btn" onclick="qty('l-small',1)">+</button><button class="ctrl-btn" onclick="qty('l-small',-1)">-</button></div></div>

<button class="confirm-btn" onclick="sendRequest()">確認預約行程</button>

<div id="admin-entrance"><button onclick="location.href='admin.html'" style="background:var(--apple-red); color:white; border:none; padding:15px 22px; border-radius:50px; font-weight:bold; box-shadow:0 4px 15px rgba(255,69,58,0.4);">⚙️ 管理後台</button></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyCg7ONT1mDIXZplNhTKPHw-cn5UbXFQJyk", authDomain: "destination-anywhere-cfd50.firebaseapp.com", projectId: "destination-anywhere-cfd50", appId: "1:718691467645:web:fb37ce5fa5708c1f788c14" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ADMIN_UID = "Uc5716677131e3d507708995b4e9f7b79";

window.qty = (id, amt) => { let el = document.getElementById(id); let v = parseInt(el.innerText) + amt; if (v >= 0) el.innerText = v; };

// 新增停靠點邏輯
window.addNewStop = () => {
  const container = document.getElementById('station-container');
  const stops = container.getElementsByClassName('station-item');
  const nextNum = stops.length + 1;
  const lastStop = stops[stops.length - 1];
  
  const newDiv = document.createElement('div');
  newDiv.className = 'station-item';
  newDiv.innerHTML = `<span>${nextNum}. 中途：</span><input type="text" class="station-input stop-point" placeholder="輸入地址"><span>✏️</span>`;
  
  // 插入在最後一個（下車）之前
  container.insertBefore(newDiv, lastStop);
  
  // 重新編號最後一個
  lastStop.querySelector('span').innerText = `${nextNum + 1}. 下車：`;
};

async function init() {
  try {
    await liff.init({ liffId: "2009434590-UHOSSHQI" });
    if (!liff.isLoggedIn()) liff.login();
    const p = await liff.getProfile();
    document.getElementById('user-greeting').innerText = "您好，" + p.displayName;
    const av = document.getElementById('user-avatar');
    if (p.pictureUrl) { av.src = p.pictureUrl; av.style.display = "inline-block"; }
    if (p.userId === ADMIN_UID) { document.getElementById('admin-link').style.display = "inline-block"; document.getElementById('admin-entrance').style.display = "block"; }
  } catch (e) { console.error(e); }
}

window.sendRequest = async () => {
  // 1. 新增這區塊：先抓取下單者的 LINE 資料 (為了 B 方案自動通知)
  let customerId = "";
  let customerName = "";
  try {
    const profile = await liff.getProfile();
    customerId = profile.userId;
    customerName = profile.displayName;
  } catch (err) {
    console.error("LIFF Profile Error", err);
    return alert("無法取得您的 LINE 資訊，請重新開啟頁面");
  }

  // 2. 抓取網頁上的輸入資料
  const stops = Array.from(document.querySelectorAll('.stop-point')).map(i => i.value.trim());
  const date = document.getElementById('order-date').value;
  const time = document.getElementById('order-time').value;

  if (stops.some(s => !s) || !date || !time) return alert("❌ 請完整填寫所有站點與時間！");

  const btn = document.querySelector('.confirm-btn');
  btn.disabled = true; 
  btn.innerText = "預約傳送中...";

  try {
    // 3. 修改這區塊：將 customerId 與 customerName 一併存入 Firebase
    await addDoc(collection(db, "orders"), {
      stops, 
      date, 
      time,
      adults: document.getElementById('adult-count').innerText,
      children: document.getElementById('child-count').innerText,
      l_large: document.getElementById('l-large').innerText,
      l_mid: document.getElementById('l-mid').innerText,
      l_small: document.getElementById('l-small').innerText,
      
      // 這是自動化通知必備的兩行
      customerId: customerId,
      customerName: customerName,
      
      status: "pending", 
      createdAt: serverTimestamp()
    });
    
    // 4. 跳轉成功頁面
    window.location.href = "success.html";
  } catch (e) { 
    alert("預約出錯，請檢查網路"); 
    btn.disabled = false; 
    btn.innerText = "確認預約行程";
  }
};

document.getElementById('today-display').innerText = new Date().toLocaleDateString();
init();
</script>
</body>
</html>
